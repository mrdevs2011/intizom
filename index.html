<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intizom — 69 Kun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='64' height='64' viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%230c0c0c'/%3E%3Cpath d='M12 48L28 32L38 42L52 20' stroke='%231D9E75' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='52' cy='20' r='5' fill='%231D9E75'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--bg2:#111;--bg3:#181818;--bg4:#222;--bg5:#2a2a2a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#efefef;--text2:#888;--text3:#444;--text4:#2a2a2a;
  --green:#1D9E75;--green2:rgba(29,158,117,0.12);--green3:rgba(29,158,117,0.06);--teal:#4DBFA0;
  --amber:#E8A020;--amber2:rgba(232,160,32,0.1);
  --red:#D94545;--red2:rgba(217,69,69,0.1);
  --blue:#3A7BD5;--blue2:rgba(58,123,213,0.12);
  --purple:#9B72CF;--purple2:rgba(155,114,207,0.1);
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --font:'Onest',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;}
.app{max-width:500px;margin:0 auto;padding:0 0 90px;}

/* === NAV === */
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 0;margin-bottom:20px;gap:10px;}
.nav-brand{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.brand-logo{width:28px;height:28px;flex-shrink:0;}
.brand-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.02em;}
.brand-status{display:flex;align-items:center;gap:5px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}
.status-offline{background:var(--red)!important;animation:none!important;}
.status-label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:0.04em;}
.nav-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;border:0.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:6px 10px;border-radius:8px;font-size:10px;font-weight:700;color:var(--text3);cursor:pointer;transition:all 0.2s;border:none;background:none;font-family:var(--font);letter-spacing:0.02em;white-space:nowrap;flex-shrink:0;}
.nav-tab.active{background:var(--bg5);color:var(--text);border:0.5px solid var(--border2);}

/* === PAGES === */
.page{display:none;padding:0 18px;}
.page.active{display:block;}

/* === CONNECTION BANNER === */
.conn-banner{background:var(--red2);border:0.5px solid rgba(217,69,69,0.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;display:none;align-items:center;gap:10px;}
.conn-banner.show{display:flex;}
.conn-banner-text{font-size:12px;color:var(--red);font-weight:600;}
.conn-banner-sub{font-size:11px;color:rgba(217,69,69,0.6);}
.reconnect-btn{margin-left:auto;background:rgba(217,69,69,0.2);border:0.5px solid rgba(217,69,69,0.4);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--red);cursor:pointer;font-family:var(--font);white-space:nowrap;}

/* === HEADER CARD === */
.header-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:0.5px solid var(--border2);border-radius:var(--radius);padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.header-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(29,158,117,0.08) 0%,transparent 70%);pointer-events:none;}
.streak-row{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
.streak-num{font-size:54px;font-weight:800;color:var(--green);line-height:1;font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.03em;}
.streak-suffix{font-size:17px;color:var(--text2);font-weight:500;}
.streak-sub{font-size:12px;color:var(--text3);margin-bottom:16px;font-family:var(--mono);}
.progress-wrap{margin-bottom:12px;}
.progress-bar{height:2px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--teal));transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.header-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:6px;}
.header-meta .val{color:var(--text2);}

/* === STATS MINI === */
.stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-mini{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;}
.stat-mini-val{font-size:22px;font-weight:800;color:var(--text);font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
.stat-mini-lbl{font-size:9px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}

/* === SECTION LABEL === */
.section-label{font-size:9px;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase;margin:18px 0 9px;font-weight:700;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--border);}

/* === PRAYER TIME CARD === */
.prayer-location-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.prayer-location-icon{width:20px;height:20px;flex-shrink:0;color:var(--text3);}
.prayer-location-text{font-size:12px;color:var(--text3);flex:1;}
.prayer-location-val{font-size:12px;color:var(--text2);font-family:var(--mono);}
.prayer-fetch-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--green);font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;}

/* === NAMOZ GRID === */
.namoz-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.namoz-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 4px;text-align:center;cursor:pointer;transition:all 0.18s;user-select:none;position:relative;}
.namoz-card:active{transform:scale(0.93);}
.namoz-card.done{border-color:var(--green);background:var(--green2);}
.namoz-card.locked{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.namoz-card.late:not(.done){border-color:var(--red);background:var(--red2);}
.namoz-card.current:not(.done){border-color:var(--amber);background:var(--amber2);}
.namoz-icon{width:22px;height:22px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;}
.namoz-icon svg{width:18px;height:18px;opacity:0.5;}
.namoz-card.done .namoz-icon svg{opacity:1;}
.namoz-name{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;}
.namoz-card.done .namoz-name{color:var(--teal);}
.namoz-card.late:not(.done) .namoz-name{color:var(--red);}
.namoz-card.current:not(.done) .namoz-name{color:var(--amber);}
.namoz-time{font-size:11px;font-weight:700;color:var(--text);margin-top:3px;font-family:var(--mono);}

/* === TASKS === */
.tasks-list{display:flex;flex-direction:column;gap:7px;}
.task-item{display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.18s;user-select:none;}
.task-item:active{transform:scale(0.99);}
.task-item.done{border-color:var(--green);background:var(--green3);}
.task-item.done .task-name{color:var(--text3);text-decoration:line-through;}
.task-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.task-circle svg{width:11px;height:11px;opacity:0;transition:opacity 0.2s;}
.task-item.done .task-circle{background:var(--green);border-color:var(--green);}
.task-item.done .task-circle svg{opacity:1;}
.task-info{flex:1;}
.task-name{font-size:14px;font-weight:600;color:var(--text);}
.task-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.task-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:var(--mono);letter-spacing:0.04em;}
.badge-js{background:rgba(58,123,213,0.15);color:#7AAAF0;}
.badge-vim{background:rgba(140,130,240,0.15);color:#BEB8F5;}
.badge-din{background:rgba(232,160,32,0.15);color:#F0C870;}

/* === BANNERS === */
.sunday-banner{background:var(--amber2);border:0.5px solid rgba(232,160,32,0.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
.sunday-title{font-size:15px;font-weight:700;color:var(--amber);margin-bottom:3px;}
.sunday-sub{font-size:12px;color:rgba(232,160,32,0.55);}
.debt-banner{background:var(--red2);border:0.5px solid rgba(217,69,69,0.25);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;cursor:pointer;}
.debt-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.debt-sub{font-size:11px;color:rgba(217,69,69,0.6);line-height:1.5;}
.quote-card{background:var(--bg2);border:0.5px solid var(--border);border-left:2px solid var(--green);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.6;color:var(--text2);font-style:italic;}

/* === CHART === */
.chart-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 14px 12px;margin-bottom:14px;}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:80px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:5px;}
.chart-bar{width:100%;max-width:20px;border-radius:3px 3px 1px 1px;transition:height 0.5s cubic-bezier(0.4,0,0.2,1);min-height:2px;}
.chart-bar.full{background:var(--green);}
.chart-bar.part{background:var(--green2);border:0.5px solid var(--teal);}
.chart-bar.none{background:var(--bg4);}
.chart-lbl{font-size:8px;color:var(--text3);font-family:var(--mono);}

/* === CALENDAR === */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month-label{font-size:14px;font-weight:700;color:var(--text);}
.cal-nav-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:background 0.15s;}
.cal-nav-btn:hover{background:var(--bg4);}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px;}
.cal-wd{font-size:9px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;font-family:var(--mono);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;border-radius:9px;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);background:var(--bg2);cursor:pointer;transition:all 0.15s;font-family:var(--mono);}
.cal-day:active{transform:scale(0.91);}
.cal-day.empty,.cal-day.outside-range{background:none;border-color:transparent;cursor:default;pointer-events:none;opacity:0.1;}
.cal-day.future{opacity:0.15;cursor:default;pointer-events:none;}
.cal-day.today{border-color:var(--green);color:var(--green);font-weight:800;}
.cal-day.completed{background:var(--green);border-color:var(--green);color:#fff;font-weight:800;}
.cal-day.partial{background:var(--green2);border-color:rgba(77,191,160,0.5);color:var(--teal);}
.cal-day.failed{background:var(--red2);border-color:rgba(217,69,69,0.2);color:var(--red);}
.cal-day.sunday-rest{background:var(--amber2);border-color:rgba(232,160,32,0.2);color:var(--amber);}
.cal-legend{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);}
.cal-legend-dot{width:9px;height:9px;border-radius:3px;}

/* === STATS PAGE === */
.stats-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.stat-big{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 16px;}
.stat-big-val{font-size:32px;font-weight:800;font-family:var(--mono);color:var(--text);letter-spacing:-0.03em;line-height:1;}
.stat-big-lbl{font-size:10px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;}
.stat-big-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
.stat-big.accent-green .stat-big-val{color:var(--green);}
.stat-big.accent-amber .stat-big-val{color:var(--amber);}
.stat-big.accent-red .stat-big-val{color:var(--red);}
.stat-big.accent-blue .stat-big-val{color:var(--blue);}
.namoz-stats-table{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;}
.nst-row{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border);}
.nst-row:last-child{border-bottom:none;}
.nst-icon{width:24px;height:24px;flex-shrink:0;margin-right:12px;display:flex;align-items:center;justify-content:center;}
.nst-icon svg{width:16px;height:16px;}
.nst-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.nst-bar-wrap{flex:2;height:4px;background:var(--bg4);border-radius:2px;margin:0 12px;}
.nst-bar-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.6s ease;}
.nst-pct{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--text2);width:36px;text-align:right;}

/* === DEBT PAGE === */
.debt-page-header{background:var(--red2);border:0.5px solid rgba(217,69,69,0.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
.debt-page-title{font-size:18px;font-weight:800;color:var(--red);margin-bottom:3px;}
.debt-page-sub{font-size:12px;color:rgba(217,69,69,0.5);}
.debt-filters{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.debt-filters::-webkit-scrollbar{display:none;}
.debt-filter{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--font);}
.debt-filter.active{background:var(--red2);border-color:rgba(217,69,69,0.4);color:var(--red);}
.debt-group{margin-bottom:14px;}
.debt-group-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:7px;padding:0 2px;}
.debt-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg2);border:0.5px solid rgba(217,69,69,0.15);border-radius:var(--radius-sm);margin-bottom:6px;}
.debt-item-day{font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);min-width:60px;}
.debt-item-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.debt-item-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-family:var(--mono);font-weight:700;}
.debt-badge-namoz{background:rgba(232,160,32,0.12);color:var(--amber);}
.debt-badge-task{background:var(--blue2);color:#7AAAF0;}
.debt-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.debt-empty-icon{font-size:32px;margin-bottom:10px;}

/* === WEEKLY REVIEW === */
.weekly-review-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;}
.wr-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.wr-week-label{font-size:14px;font-weight:700;color:var(--text);}
.wr-nav-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;transition:background 0.15s;}
.wr-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.wr-day-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.wr-day-lbl{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:0.04em;}
.wr-day-circle{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:var(--mono);cursor:pointer;transition:all 0.15s;}
.wr-day-circle.full{background:var(--green);color:#fff;}
.wr-day-circle.part{background:var(--green2);border:0.5px solid var(--teal);color:var(--teal);}
.wr-day-circle.failed{background:var(--red2);border:0.5px solid rgba(217,69,69,0.2);color:var(--red);}
.wr-day-circle.sunday{background:var(--amber2);border:0.5px solid rgba(232,160,32,0.2);color:var(--amber);}
.wr-day-circle.future{background:var(--bg4);color:var(--text4);}
.wr-day-circle.out{opacity:0.2;pointer-events:none;}
.wr-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.wr-stat{text-align:center;}
.wr-stat-val{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--text);}
.wr-stat-lbl{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;}
.wr-journal-section{border-top:0.5px solid var(--border);padding-top:14px;}
.wr-journal-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.wr-journal-textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;}
.wr-journal-textarea:focus{border-color:var(--border2);}
.wr-journal-textarea::placeholder{color:var(--text3);}
.wr-journal-save{margin-top:8px;width:100%;padding:11px;background:var(--green2);border:0.5px solid rgba(29,158,117,0.3);border-radius:9px;color:var(--green);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background 0.15s;}
.wr-journal-save:hover{background:rgba(29,158,117,0.2);}

/* === JOURNAL PAGE === */
.journal-search{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color 0.2s;margin-bottom:12px;}
.journal-search:focus{border-color:var(--border2);}
.journal-search::placeholder{color:var(--text3);}
.journal-entry{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.journal-entry:hover{border-color:var(--border2);}
.journal-entry-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.journal-entry-day{font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);}
.journal-entry-date{font-size:12px;color:var(--text2);flex:1;}
.journal-entry-badge{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.journal-entry-text{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.journal-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}

.ptc-sub{font-size:11px;color:var(--text3);}
.ptc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--border);transition:background 0.15s;}
.ptc-row:last-child{border-bottom:none;}

.ptc-info{flex:1;}
.ptc-name{font-size:14px;font-weight:700;color:var(--text);}
.ptc-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.ptc-time-col{text-align:right;}
.ptc-time{font-size:18px;font-weight:800;color:var(--text);font-family:var(--mono);letter-spacing:-0.02em;}
.ptc-window{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono);}

// ============================================================
// UTILITIES
// ============================================================
function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function getDayNum() {
  return Math.min(Math.max(Math.floor((new Date() - START) / 86400000) + 1, 1), TOTAL_DAYS);
}
function getDaysLeft() {
  return Math.max(0, Math.ceil((END - new Date()) / 86400000));
}
function isSunday(key) {
  return new Date(key + 'T12:00:00').getDay() === 0;
}
function keyToDate(key) {
  return new Date(key + 'T12:00:00');
}
function formatKey(key) {
  var d = keyToDate(key);
  var mNames = ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'];
  var dayNames = ['Ya','Du','Se','Ch','Pa','Ju','Sh'];
  return dayNames[d.getDay()] + ', ' + d.getDate() + ' ' + mNames[d.getMonth()];
}

// ============================================================
// ANTI-CHEAT
// ============================================================
function isPastDayLocked(key) {
  if (key > todayKey()) return true;
  var diffDays = Math.round((keyToDate(todayKey()) - keyToDate(key)) / 86400000);
  return diffDays > EDIT_WINDOW_DAYS;
}
function isNamozLockedByTime(namozId, key) {
  if (key !== todayKey()) return false;
  var n = NAMOZLAR.find(function(x){ return x.id === namozId; });
  if (!n) return false;
  var parts = n.time.split(':');
  var nt = new Date();
  nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  return new Date() < nt;
}
function isNamozLocked(namozId, key) {
  if (isPastDayLocked(key)) return true;
  return isNamozLockedByTime(namozId, key);
}
function isNamozLate(namozId, key) {
  if (key !== todayKey()) return false;
  var n = NAMOZLAR.find(function(x){ return x.id === namozId; });
  if (!n) return false;
  var parts = n.time.split(':');
  var nt = new Date();
  nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  return (new Date() - nt) / 60000 > LATE_AFTER_MIN;
}
function isNamozCurrent(namozId, key) {
  if (key !== todayKey()) return false;
  var idx = NAMOZLAR.findIndex(function(x){ return x.id === namozId; });
  if (idx < 0) return false;
  var n = NAMOZLAR[idx];
  var parts = n.time.split(':');
  var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  var now = new Date();
  if (now < nt) return false;
  var diffMin = (now - nt) / 60000;
  if (diffMin > LATE_AFTER_MIN) return false;
  if (idx + 1 < NAMOZLAR.length) {
    var np = NAMOZLAR[idx+1].time.split(':');
    var nxt = new Date(); nxt.setHours(parseInt(np[0],10), parseInt(np[1],10), 0, 0);
    return now < nxt;
  }
  return true;
}
function isTaskLocked(key) { return isPastDayLocked(key); }

// ============================================================
// DATA LOGIC
// ============================================================
function isDayComplete(key) {
  var ds = state[key] || {};
  if (!NAMOZLAR.every(function(n){ return ds['n_' + n.id]; })) return false;
  if (isSunday(key)) return true;
  return TASKS.every(function(t){ return ds['t_' + t.id]; });
}
function isDayPartial(key) {
  var ds = state[key] || {};
  var any = NAMOZLAR.some(function(n){ return ds['n_' + n.id]; }) ||
            TASKS.some(function(t){ return ds['t_' + t.id]; });
  return any && !isDayComplete(key);
}
function getStreak() {
  var streak = 0;
  var today = new Date();
  var tk = todayKey();
  for (var i = 0; i < TOTAL_DAYS; i++) {
    var d = new Date(today); d.setDate(d.getDate() - i);
    if (d < START) break;
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (isDayComplete(key)) streak++;
    else if (key !== tk) break;
  }
  return streak;
}
function getTotalComplete() {
  var today = new Date();
  var count = 0;
  Object.keys(state).forEach(function(k){
    var d = keyToDate(k);
    if (d >= START && d <= today && isDayComplete(k)) count++;
  });
  return count;
}
function getDebtItems() {
  var debts = [];
  var today = new Date();
  var tk = todayKey();
  for (var i = 1; i <= TOTAL_DAYS; i++) {
    var d = new Date(today); d.setDate(d.getDate() - i);
    if (d < START) break;
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (key === tk) continue;
    var ds = state[key] || {};
    NAMOZLAR.forEach(function(n){
      if (!ds['n_' + n.id]) debts.push({ key: key, name: n.name, type: 'namoz' });
    });
    if (!isSunday(key)) {
      TASKS.forEach(function(t){
        if (!ds['t_' + t.id]) debts.push({ key: key, name: t.name, type: 'task' });
      });
    }
  }
  return debts;
}
function getNamozStats() {
  var counts = {};
  NAMOZLAR.forEach(function(n){ counts[n.id] = { done: 0, total: 0 }; });
  var today = new Date();
  var tk = todayKey();
  var startStr = START.toISOString().slice(0,10);
  var d = new Date(START);
  while (d <= today) {
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (key <= tk && key >= startStr) {
      var ds = state[key] || {};
      NAMOZLAR.forEach(function(n){
        counts[n.id].total++;
        if (ds['n_' + n.id]) counts[n.id].done++;
      });
    }
    d.setDate(d.getDate() + 1);
  }
  return counts;
}
function getWeekDays(offset) {
  var today = new Date();
  var dow = today.getDay();
  var mon = new Date(today);
  mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(d);
  }
  return days;
}

// ============================================================
// PRAYER TIME HELPERS
// ============================================================
function getNextNamoz() {
  var now = new Date();
  for (var i = 0; i < NAMOZLAR.length; i++) {
    var n = NAMOZLAR[i];
    var parts = n.time.split(':');
    var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
    if (now < nt) return { namoz: n, time: nt, index: i };
  }
  // Next day bomdod
  var bomdod = NAMOZLAR[0];
  var parts = bomdod.time.split(':');
  var nt = new Date(); nt.setDate(nt.getDate() + 1);
  nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  return { namoz: bomdod, time: nt, index: 0 };
}

function getCurrentNamozStatus(namozId) {
  var now = new Date();
  var idx = NAMOZLAR.findIndex(function(x){ return x.id === namozId; });
  if (idx < 0) return 'waiting';
  var n = NAMOZLAR[idx];
  var parts = n.time.split(':');
  var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  if (now < nt) return 'waiting';
  var diff = (now - nt) / 60000;
  if (diff <= LATE_AFTER_MIN) return 'current';
  return 'late';
}

function formatCountdown(ms) {
  if (ms <= 0) return '00:00:00';
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  return pad(h) + ':' + pad(m) + ':' + pad(s);
}

function setOnline(on) {
  isOnline = on;
  var dot = document.getElementById('statusDot');
  var lbl = document.getElementById('statusLabel');
  var banner = document.getElementById('connBanner');
  if (dot && lbl) {
    if (on) { dot.classList.remove('status-offline'); lbl.textContent = 'sync'; }
    else { dot.classList.add('status-offline'); lbl.textContent = 'offline'; }
  }
  if (banner) banner.classList.toggle('show', !on);
}
function startFirestoreListener() {
  if (!db) { setOnline(false); renderCurrentPage(); return; }
  if (unsubscribe) { try { unsubscribe(); } catch(e){} }
  try {
    unsubscribe = db.collection('users').doc(USER_ID).collection('days')
      .onSnapshot(function(snapshot) {
        setOnline(true);
        snapshot.docChanges().forEach(function(change) {
          if (change.type === 'removed') delete state[change.doc.id];
          else state[change.doc.id] = change.doc.data();
        });
        renderCurrentPage();
      }, function() {
        setOnline(false);
        renderCurrentPage();
      });
  } catch(e) { setOnline(false); renderCurrentPage(); }
}
function saveDay(key, data) {
  if (!db || !isOnline) { showToast("Tarmoq yo'q. Ma'lumot saqlanmadi."); return; }
  showSaving();
  db.collection('users').doc(USER_ID).collection('days').doc(key)
    .set(data, { merge: true })
    .then(function(){ hideSaving(); })
    .catch(function(err){ hideSaving(); showToast('Saqlash xatosi: ' + err.message); });
}
function showSaving() {
  var pill = document.getElementById('savingPill');
  if (pill) { pill.textContent = 'Saqlanmoqda...'; pill.classList.add('show'); }
}
function hideSaving() {
  var pill = document.getElementById('savingPill');
  if (!pill) return;
  pill.textContent = 'Saqlandi ✓';
  if (savingTimer) clearTimeout(savingTimer);
  savingTimer = setTimeout(function(){ pill.classList.remove('show'); }, 1400);
}

  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  currentPage = id;
  if (helpCountdownTimer) { clearInterval(helpCountdownTimer); helpCountdownTimer = null; }
  renderCurrentPage();
};

APP.toggleNamoz = function(id, key) {
  if (!isOnline) { showToast("Offline. Avval tarmoqqa ulaning."); return; }
  if (isNamozLocked(id, key)) {
    if (isNamozLockedByTime(id, key)) showToast('Bu namoz vaqti hali kelmagan — sabr qiling.');
    else showToast("Bu kun qulflangan — o'zgartirish mumkin emas.");
    return;
  }
  if (!state[key]) state[key] = {};
  state[key]['n_' + id] = !state[key]['n_' + id];
  saveDay(key, state[key]);
  renderCurrentPage();
  if (modalKey === key) renderModal(key);
};

APP.toggleTask = function(id, key) {
  if (!isOnline) { showToast("Offline. Avval tarmoqqa ulaning."); return; }
  if (isTaskLocked(key)) {
    showToast("Bu kun qulflangan — faqat bugun va kecha tahrirlanadi.");
    return;
  }
  if (!state[key]) state[key] = {};
  state[key]['t_' + id] = !state[key]['t_' + id];
  saveDay(key, state[key]);
  renderCurrentPage();
  if (modalKey === key) renderModal(key);
};

APP.saveJournal = function(key, value) {
  if (!isOnline) { showToast("Offline. Journal saqlanmadi."); return; }
  if (isPastDayLocked(key)) return;
  if (!state[key]) state[key] = {};
  state[key]['journal'] = value;
  saveDay(key, state[key]);
};

APP.exportData = function() {
  var exportState = {};
  Object.keys(state).forEach(function(k){ if (!k.startsWith('_week_')) exportState[k] = state[k]; });
  var blob = new Blob([JSON.stringify(exportState, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'intizom-backup-' + todayKey() + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Backup yuklab olindi.');
};

APP.requestNotif = function() {
  if (!('Notification' in window)) { showToast("Brauzer notification'ni qo'llamaydi."); return; }
  Notification.requestPermission().then(function(perm){
    if (perm === 'granted') { showToast("Eslatmalar yoqildi!"); startNotifWatcher(); }
    else showToast("Eslatmalarga ruxsat berilmadi.");
  });
};

APP.setJournalSearch = function(val) {
  journalSearch = val;
  renderJournal();
};

APP.toggleJournalEntry = function(key) {
  expandedJournalKey = (expandedJournalKey === key) ? null : key;
  renderJournal();
};

APP.saveJournalEntry = function(key, val) {
  APP.saveJournal(key, val);
  showToast('Jurnal yozuvi saqlandi ✓');
};

// ============================================================
// NOTIFICATION WATCHER
// ============================================================
function startNotifWatcher() {
  if (notifTimer) clearInterval(notifTimer);
  var notified = {};
  notifTimer = setInterval(function(){
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    var now = new Date();
    var tk = todayKey();
    NAMOZLAR.forEach(function(n){
      var parts = n.time.split(':');
      var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
      var diffMin = (now - nt) / 60000;
      var flagKey = tk + '_' + n.id;
      if (diffMin >= 0 && diffMin < 1 && !notified[flagKey]) {
        notified[flagKey] = true;
        var ds = state[tk] || {};
        if (!ds['n_' + n.id]) new Notification('Intizom — ' + n.name, { body: n.name + ' namozi vaqti keldi (' + n.time + ').' });
      }
    });
  }, 30000);
}

function renderChartCard() {
  var days = [];
  var today = new Date();
  for (var i = 13; i >= 0; i--) {
    var d = new Date(today); d.setDate(d.getDate() - i);
    if (d < START) continue;
    days.push(d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()));
  }
  var dayLabels = ['Ya','Du','Se','Ch','Pa','Ju','Sh'];
  var html = '<div class="section-label">So\'nggi 14 kun</div><div class="chart-card"><div class="chart-bars">';
  days.forEach(function(key){
    var ds = state[key] || {};
    var sunday = isSunday(key);
    var totalSlots = sunday ? NAMOZLAR.length : (NAMOZLAR.length + TASKS.length);
    var doneSlots = NAMOZLAR.filter(function(n){ return ds['n_' + n.id]; }).length;
    if (!sunday) doneSlots += TASKS.filter(function(t){ return ds['t_' + t.id]; }).length;
    var pct = totalSlots ? (doneSlots / totalSlots) : 0;
    var h = Math.max(3, Math.round(pct * 72));
    var cls = pct >= 0.999 ? 'full' : (pct > 0 ? 'part' : 'none');
    var dow = keyToDate(key).getDay();
    html += '<div class="chart-bar-wrap"><div class="chart-bar ' + cls + '" style="height:' + h + 'px"></div>' +
      '<div class="chart-lbl">' + dayLabels[dow] + '</div></div>';
  });
  html += '</div></div>';
  return html;
}

function renderDebt() {
  var allDebts = getDebtItems();
  var filtered = allDebts.filter(function(d) {
    if (debtFilter === 'namoz') return d.type === 'namoz';
    if (debtFilter === 'task') return d.type === 'task';
    return true;
  });
  var namozCount = allDebts.filter(function(d){ return d.type === 'namoz'; }).length;
  var taskCount = allDebts.filter(function(d){ return d.type === 'task'; }).length;
  var html = '';
  html += '<div class="debt-page-header">' +
    '<div class="debt-page-title">' + allDebts.length + ' ta qarz</div>' +
    '<div class="debt-page-sub">Namoz: ' + namozCount + ' · Vazifa: ' + taskCount + '</div>' +
    '</div>';
  html += '<div class="debt-filters">' +
    '<div class="debt-filter ' + (debtFilter==='all'?'active':'') + '" onclick="APP.setDebtFilter(\'all\')">Hammasi (' + allDebts.length + ')</div>' +
    '<div class="debt-filter ' + (debtFilter==='namoz'?'active':'') + '" onclick="APP.setDebtFilter(\'namoz\')">Namoz (' + namozCount + ')</div>' +
    '<div class="debt-filter ' + (debtFilter==='task'?'active':'') + '" onclick="APP.setDebtFilter(\'task\')">Vazifa (' + taskCount + ')</div>' +
    '</div>';
  if (filtered.length === 0) {
    html += '<div class="debt-empty"><div class="debt-empty-icon">✓</div>' +
      (allDebts.length === 0 ? 'Hech qanday qarz yo\'q! Ajoyib.' : 'Bu filtr bo\'yicha qarz yo\'q.') +
      '</div>';
  } else {
    var groups = {};
    filtered.forEach(function(d) {
      if (!groups[d.key]) groups[d.key] = [];
      groups[d.key].push(d);
    });
    var sortedKeys = Object.keys(groups).sort(function(a, b){ return b > a ? 1 : -1; });
    sortedKeys.forEach(function(key) {
      var dayNum = Math.floor((keyToDate(key) - START) / 86400000) + 1;
      var clickable = !isPastDayLocked(key);
      html += '<div class="debt-group">' +
        '<div class="debt-group-label">' + dayNum + '-kun &nbsp;·&nbsp; ' + formatKey(key) + (clickable ? ' &nbsp;·&nbsp; <span style="color:var(--green);cursor:pointer" onclick="APP.openModal(\'' + key + '\')">tahrirlash →</span>' : ' &nbsp;<span style="color:var(--text3);font-size:9px">qulflangan</span>') + '</div>';
      groups[key].forEach(function(d) {
        html += '<div class="debt-item">' +
          '<div class="debt-item-day">' + (d.type === 'namoz' ? '🕌' : '📚') + '</div>' +
          '<div class="debt-item-name">' + d.name + '</div>' +
          '<div class="debt-item-badge ' + (d.type === 'namoz' ? 'debt-badge-namoz' : 'debt-badge-task') + '">' + (d.type === 'namoz' ? 'Namoz' : 'Vazifa') + '</div>' +
          '</div>';
      });
      html += '</div>';
    });
  }
  document.getElementById('debtContent').innerHTML = html;
}

function renderWeekly() {
  var days = getWeekDays(weeklyOffset);
  var today = new Date();
  var dayLbls = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
  var monDate = days[0];
  var sunDate = days[6];
  var mNames = ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'];
  var weekLabel = monDate.getDate() + ' ' + mNames[monDate.getMonth()] + ' — ' + sunDate.getDate() + ' ' + mNames[sunDate.getMonth()];
  var weekKey = days[0].getFullYear() + '-' + pad(days[0].getMonth()+1) + '-' + pad(days[0].getDate());
  var totalDays = 0, completeDays = 0, partialDays = 0, failedDays = 0;
  days.forEach(function(d) {
    var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (d < START || d > today) return;
    totalDays++;
    if (isDayComplete(k)) completeDays++;
    else if (isDayPartial(k)) partialDays++;
    else failedDays++;
  });
  var totalNamozThisWeek = 0, totalNamozPossible = 0;
  days.forEach(function(d) {
    var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (d < START || d > today) return;
    var ds = state[k] || {};
    NAMOZLAR.forEach(function(n){
      totalNamozPossible++;
      if (ds['n_' + n.id]) totalNamozThisWeek++;
    });
  });
  var weeklyJournal = '';
  var wj = state['_week_' + weekKey];
  if (wj && wj.journal) weeklyJournal = wj.journal;
  var html = '<div class="weekly-review-card">';
  html += '<div class="wr-week-nav">' +
    '<button class="wr-nav-btn" onclick="APP.weeklyPrev()">&#8249;</button>' +
    '<div class="wr-week-label">' + weekLabel + '</div>' +
    '<button class="wr-nav-btn" ' + (weeklyOffset >= 0 ? 'style="opacity:0.3;pointer-events:none"' : '') + ' onclick="APP.weeklyNext()">&#8250;</button>' +
    '</div>';
  html += '<div class="wr-days-grid">';
  days.forEach(function(d, i) {
    var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    var inRange = d >= START && d <= today;
    var isFuture = d > today;
    var isToday = k === todayKey();
    var isSun = d.getDay() === 0;
    var circleClass = 'wr-day-circle ';
    if (!inRange || isFuture) circleClass += 'out';
    else if (isDayComplete(k)) circleClass += 'full';
    else if (isSun) circleClass += 'sunday';
    else if (isDayPartial(k) || isToday) circleClass += 'part';
    else circleClass += 'failed';
    var border = isToday ? 'border:1.5px solid var(--green);' : '';
    html += '<div class="wr-day-col">' +
      '<div class="wr-day-lbl">' + dayLbls[i] + '</div>' +
      '<div class="' + circleClass + '" style="' + border + '" onclick="' + (inRange&&!isFuture?'APP.openModal(\''+k+'\')':'') + '">' + d.getDate() + '</div>' +
      '</div>';
  });
  html += '</div>';
  html += '<div class="wr-stats-row">' +
    '<div class="wr-stat"><div class="wr-stat-val" style="color:var(--green)">' + completeDays + '</div><div class="wr-stat-lbl">Mukammal</div></div>' +
    '<div class="wr-stat"><div class="wr-stat-val" style="color:var(--teal)">' + partialDays + '</div><div class="wr-stat-lbl">Qisman</div></div>' +
    '<div class="wr-stat"><div class="wr-stat-val" style="color:var(--red)">' + failedDays + '</div><div class="wr-stat-lbl">O\'tkazib</div></div>' +
    '<div class="wr-stat"><div class="wr-stat-val">' + totalNamozThisWeek + '/' + totalNamozPossible + '</div><div class="wr-stat-lbl">Namoz</div></div>' +
    '</div>';
  html += '<div class="wr-journal-section">' +
    '<div class="wr-journal-title">' + (weeklyOffset === 0 ? 'Bu hafta haqida' : 'Hafta sharhi') + '</div>' +
    '<textarea class="wr-journal-textarea" id="weeklyJournalInput" placeholder="Bu hafta qanday o\'tdi? Nimani yaxshi qilding? Nimani yaxshilash kerak?">' +
    (weeklyJournal ? weeklyJournal.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '') + '</textarea>' +
    '<button class="wr-journal-save" onclick="APP.saveWeeklyJournal(\'' + weekKey + '\', document.getElementById(\'weeklyJournalInput\').value)">Saqlash</button>' +
    '</div>';
  html += '</div>';
  html += '<div class="section-label">Namoz tahlili</div><div class="namoz-stats-table">';
  NAMOZLAR.forEach(function(n, ni) {
    var done = 0, total = 0;
    days.forEach(function(d) {
      var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
      if (d < START || d > today) return;
      total++;
      var ds = state[k] || {};
      if (ds['n_' + n.id]) done++;
    });
    var pct = total ? Math.round((done / total) * 100) : 0;
    html += '<div class="nst-row">' +
      '<div class="nst-icon" style="color:var(--green)">' + ICONS[NAMOZ_ICONS[ni]] + '</div>' +
      '<div class="nst-name">' + n.name + '</div>' +
      '<div class="nst-bar-wrap"><div class="nst-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="nst-pct">' + done + '/' + total + '</div>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById('weeklyContent').innerHTML = html;
}

function renderJournal() {
  var allEntries = [];
  var today = new Date();
  var d = new Date(START);
  while (d <= today) {
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    var ds = state[key] || {};
    allEntries.push({ key: key, text: ds.journal || '', complete: isDayComplete(key), partial: isDayPartial(key) });
    d.setDate(d.getDate() + 1);
  }
  var filtered = allEntries.filter(function(e) {
    if (!journalSearch) return e.text.length > 0 || e.key === todayKey();
    return e.text.toLowerCase().indexOf(journalSearch.toLowerCase()) > -1;
  }).reverse();
  var withText = allEntries.filter(function(e){ return e.text.length > 0; }).length;
  var html = '';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">' +
    '<div style="font-size:22px;font-weight:800;color:var(--text);font-family:var(--mono);">' + withText + '</div>' +
    '<div style="font-size:12px;color:var(--text3);">yozuv · ' + getDayNum() + ' kundan</div>' +
    '</div>';
  html += '<input type="text" class="journal-search" placeholder="Jurnal ichida qidirish..." oninput="APP.setJournalSearch(this.value)" value="' + journalSearch.replace(/"/g,'&quot;') + '">';
  if (filtered.length === 0) {
    html += '<div class="journal-empty">Hech qanday yozuv topilmadi.</div>';
  } else {
    filtered.forEach(function(e) {
      var dayNum = Math.floor((keyToDate(e.key) - START) / 86400000) + 1;
      var isExpanded = expandedJournalKey === e.key;
      var isLocked = isPastDayLocked(e.key);
      var dotColor = e.complete ? 'var(--green)' : (e.partial ? 'var(--teal)' : 'var(--red2)');
      html += '<div class="journal-entry ' + (isExpanded?'expanded':'') + '" onclick="APP.toggleJournalEntry(\'' + e.key + '\')">' +
        '<div class="journal-entry-header">' +
        '<div class="journal-entry-day">' + dayNum + '-kun</div>' +
        '<div class="journal-entry-date">' + formatKey(e.key) + '</div>' +
        '<div class="journal-entry-badge" style="background:' + dotColor + '"></div>' +
        '</div>';
      if (e.text) {
        html += '<div class="journal-entry-text">' + e.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
      } else {
        html += '<div class="journal-entry-text" style="color:var(--text3);font-style:italic">Yozuv yo\'q — bosing va yozing...</div>';
      }
      if (isExpanded) {
        html += '<textarea class="journal-entry-edit open" placeholder="Bu kun haqida yozing..." ' +
          (isLocked ? 'disabled style="opacity:0.4"' : '') +
          ' onblur="APP.saveJournalEntry(\'' + e.key + '\', this.value)" onclick="event.stopPropagation()">' +
          (e.text ? e.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '') + '</textarea>';
        if (isLocked) {
          html += '<div style="font-size:11px;color:var(--text3);margin-top:8px;">🔒 Bu kun qulflangan.</div>';
        }
      }
      html += '</div>';
    });
  }
  document.getElementById('journalContent').innerHTML = html;
}

function renderStats() {
  var streak = getStreak();
  var totalDone = getTotalComplete();
  var dayNum = getDayNum();
  var successPct = dayNum > 1 ? Math.round((totalDone / (dayNum - 1)) * 100) : 0;
  var debts = getDebtItems();
  var namozStats = getNamozStats();
  var bestStreak = 0, curS = 0;
  var today2 = new Date();
  for (var i = 0; i < TOTAL_DAYS; i++) {
    var d = new Date(today2); d.setDate(d.getDate() - i);
    if (d < START) break;
    var k = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if (isDayComplete(k)) { curS++; if (curS > bestStreak) bestStreak = curS; }
    else curS = 0;
  }
  var totalNamoz = 0, totalNamozPossible = 0;
  Object.values(namozStats).forEach(function(s){ totalNamoz += s.done; totalNamozPossible += s.total; });
  var html = '';
  html += '<div class="stats-big-grid">' +
    '<div class="stat-big accent-green"><div class="stat-big-val">' + streak + '</div><div class="stat-big-lbl">Joriy Streak</div><div class="stat-big-sub">kun uzluksiz</div></div>' +
    '<div class="stat-big accent-blue"><div class="stat-big-val">' + bestStreak + '</div><div class="stat-big-lbl">Eng Uzun</div><div class="stat-big-sub">streak</div></div>' +
    '<div class="stat-big accent-green"><div class="stat-big-val">' + totalDone + '</div><div class="stat-big-lbl">Mukammal Kun</div><div class="stat-big-sub">/ ' + (dayNum-1) + ' o\'tdi</div></div>' +
    '<div class="stat-big ' + (successPct >= 80 ? 'accent-green' : successPct >= 50 ? 'accent-amber' : 'accent-red') + '"><div class="stat-big-val">' + successPct + '%</div><div class="stat-big-lbl">Umumiy Natija</div><div class="stat-big-sub">muvaffaqiyat</div></div>' +
    '</div>';
  html += '<div class="stats-big-grid">' +
    '<div class="stat-big"><div class="stat-big-val">' + totalNamoz + '</div><div class="stat-big-lbl">Namoz O\'qildi</div><div class="stat-big-sub">/ ' + totalNamozPossible + ' dan</div></div>' +
    '<div class="stat-big accent-red"><div class="stat-big-val">' + debts.length + '</div><div class="stat-big-lbl">Qarz</div><div class="stat-big-sub">bajarilmagan</div></div>' +
    '</div>';
  html += '<div class="section-label">Har bir namoz</div><div class="namoz-stats-table">';
  NAMOZLAR.forEach(function(n, i) {
    var s = namozStats[n.id];
    var pct = s.total ? Math.round((s.done / s.total) * 100) : 0;
    html += '<div class="nst-row">' +
      '<div class="nst-icon" style="color:var(--green)">' + ICONS[NAMOZ_ICONS[i]] + '</div>' +
      '<div class="nst-name">' + n.name + '</div>' +
      '<div class="nst-bar-wrap"><div class="nst-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="nst-pct">' + pct + '%</div>' +
      '</div>';
  });
  html += '</div>';
  var dayLbls = ['Ya','Du','Se','Ch','Pa','Ju','Sh'];
  var wEnd = new Date(today2);
  wEnd.setDate(wEnd.getDate() + (0 - wEnd.getDay() + 7) % 7);
  if (wEnd > today2) wEnd.setDate(wEnd.getDate() - 7);
  var weeks = [];
  for (var w = 6; w >= 0; w--) {
    var weekDays = [];
    var sunOfWeek = new Date(wEnd); sunOfWeek.setDate(wEnd.getDate() - w * 7);
    var monOfWeek = new Date(sunOfWeek); monOfWeek.setDate(sunOfWeek.getDate() - 6);
    for (var wd = 0; wd < 7; wd++) {
      var dd = new Date(monOfWeek); dd.setDate(monOfWeek.getDate() + wd);
      weekDays.push(dd);
    }
    weeks.push(weekDays);
  }
  html += '<div class="section-label">Haftalik ko\'rinish</div>';
  html += '<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;overflow-x:auto;">';
  html += '<div style="display:flex;gap:4px;min-width:min-content;">';
  html += '<div style="display:flex;flex-direction:column;gap:4px;margin-right:4px;">';
  html += '<div style="height:14px"></div>';
  dayLbls.forEach(function(l){
    html += '<div style="font-size:8px;color:var(--text3);font-family:var(--mono);height:14px;display:flex;align-items:center;letter-spacing:0.06em;">' + l + '</div>';
  });
  html += '</div>';
  weeks.forEach(function(wDays) {
    html += '<div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:28px;">';
    var wk = wDays[6];
    var wLabel = pad(wk.getMonth()+1) + '/' + pad(wk.getDate());
    html += '<div style="font-size:7px;color:var(--text3);font-family:var(--mono);text-align:center;height:14px;white-space:nowrap;">' + wLabel + '</div>';
    wDays.forEach(function(dd) {
      var key2 = dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate());
      var inRange = dd >= START && dd <= today2;
      var bgColor = 'var(--bg4)';
      if (inRange) {
        if (isDayComplete(key2)) bgColor = 'var(--green)';
        else if (isDayPartial(key2)) bgColor = 'var(--teal)';
        else if (dd < today2) bgColor = 'rgba(217,69,69,0.25)';
      }
      html += '<div style="height:14px;border-radius:3px;background:' + bgColor + ';opacity:' + (inRange?1:0.15) + '"></div>';
    });
    html += '</div>';
  });
  html += '</div></div>';
  document.getElementById('statsContent').innerHTML = html;
}

// ============================================================
// RENDER: CALENDAR
// ============================================================
function renderCalendar() {
  var today = new Date();
  var todayStr = todayKey();
  var monthNames = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay  = new Date(calYear, calMonth + 1, 0);
  var startDow = firstDay.getDay();
  if (startDow === 0) startDow = 7;
  var html = '<div class="cal-month-nav">' +
    '<button class="cal-nav-btn" onclick="APP.calPrev()">&#8249;</button>' +
    '<div class="cal-month-label">' + monthNames[calMonth] + ' ' + calYear + '</div>' +
    '<button class="cal-nav-btn" onclick="APP.calNext()">&#8250;</button></div>' +
    '<div class="cal-weekdays"><div class="cal-wd">Du</div><div class="cal-wd">Se</div><div class="cal-wd">Ch</div>' +
    '<div class="cal-wd">Pa</div><div class="cal-wd">Ju</div><div class="cal-wd">Sh</div>' +
    '<div class="cal-wd" style="color:var(--amber)">Ya</div></div>' +
    '<div class="cal-grid">';
  for (var i = 1; i < startDow; i++) html += '<div class="cal-day empty"></div>';
  for (var day = 1; day <= lastDay.getDate(); day++) {
    var dateObj = new Date(calYear, calMonth, day);
    var key = dateObj.getFullYear() + '-' + pad(dateObj.getMonth()+1) + '-' + pad(dateObj.getDate());
    var inRange = dateObj >= START && dateObj < END;
    var isFuture = dateObj > today;
    var isToday = key === todayStr;
    var isSun = dateObj.getDay() === 0;
    var cls = 'cal-day';
    if (!inRange) cls += ' outside-range';
    else if (isFuture) cls += ' future';
    else if (isDayComplete(key)) cls += ' completed';
    else if (isToday) cls += ' today';
    else if (isSun) cls += ' sunday-rest';
    else if (isDayPartial(key)) cls += ' partial';
    else cls += ' failed';
    var clickable = inRange && !isFuture;
    html += '<div class="' + cls + '"' + (clickable ? ' onclick="APP.openModal(\'' + key + '\')"' : '') + '>' + day + '</div>';
  }
  html += '</div><div class="cal-legend">' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>Mukammal</div>' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green2);border:0.5px solid var(--teal)"></div>Qisman</div>' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--red2);border:0.5px solid var(--red)"></div>O\'tkazib</div>' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--amber2);border:0.5px solid var(--amber)"></div>Yakshanba</div>' +
    '</div>';
  document.getElementById('calContent').innerHTML = html;
}

// ============================================================
// RENDER: MODAL
// ============================================================
function renderModal(key) {
  var ds = state[key] || {};
  var dateObj = keyToDate(key);
  var sunday = isSunday(key);
  var dayNames = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
  var mNames = ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'];
  var label = dayNames[dateObj.getDay()] + ', ' + dateObj.getDate() + ' ' + mNames[dateObj.getMonth()];
  var dayNum = Math.floor((dateObj - START) / 86400000) + 1;
  var locked = isPastDayLocked(key);
  var html = '<div class="modal-title">' + dayNum + '-kun' + (locked ? ' &nbsp;<span style="font-size:13px;color:var(--text3);font-weight:500">qulflangan</span>' : '') + '</div>' +
    '<div class="modal-date">' + label + '</div>';
  if (locked) {
    html += '<div class="modal-locked-banner">' +
      '<div class="modal-locked-icon" style="color:var(--text3)">' + ICONS.lock + '</div>' +
      '<div class="modal-locked-text">Bu kun qulflangan — faqat bugun va kecha tahrirlanadi.</div>' +
      '</div>';
  }
  if (sunday) {
    html += '<div class="sunday-banner" style="margin-bottom:14px"><div class="sunday-title">Yakshanba — dam olish</div>' +
      '<div class="sunday-sub">Faqat namoz. Xohlaganing qil.</div></div>';
  }
  html += '<div class="section-label">Namozlar</div><div class="modal-namoz-grid">';
  NAMOZLAR.forEach(function(n, i) {
    var done = !!ds['n_' + n.id];
    var nlocked = locked;
    var iconKey = NAMOZ_ICONS[i];
    html += '<div class="modal-namoz ' + (done?'done ':'') + (nlocked?'locked':'') + '" onclick="APP.toggleNamoz(\'' + n.id + '\',\'' + key + '\')">' +
      '<div class="mn-icon" style="color:' + (done?'var(--green)':'var(--text3)') + '">' +
        (done ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>'
              : (nlocked ? ICONS.lock : ICONS[iconKey])) +
      '</div>' +
      '<div class="mn-name">' + n.name + '</div>' +
      '<div class="mn-time">' + n.time + '</div></div>';
  });
  html += '</div>';
  if (!sunday) {
    html += '<div class="section-label">Vazifalar</div><div class="modal-tasks">';
    TASKS.forEach(function(t) {
      var done = !!ds['t_' + t.id];
      html += '<div class="modal-task ' + (done?'done':'') + '" onclick="APP.toggleTask(\'' + t.id + '\',\'' + key + '\')">' +
        '<div class="mt-circle"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<div class="mt-info"><div class="mt-name">' + t.name + '</div><div class="mt-meta">' + t.meta + '</div></div></div>';
    });
    html += '</div>';
  }
  if (!locked) {
    html += '<div class="section-label">Kundalik</div>' +
      '<textarea class="modal-journal" placeholder="Bugun qanday o\'tdi? Qisqacha yoz..." onblur="APP.saveJournal(\'' + key + '\', this.value)">' +
      (ds.journal ? ds.journal.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '') + '</textarea>';
  }
  document.getElementById('modalContent').innerHTML = html;
}

// ============================================================
// RENDER: HELP PAGE
// ============================================================
function renderHelp() {
  var now = new Date();
  var tk = todayKey();
  var ds = state[tk] || {};

  // Determine status of each namoz
  var html = '';

  // Header
  html += '<div class="help-header">' +
    '<div class="help-header-title">Namoz vaqtlari</div>' +
    '<div class="help-header-sub">' + (prayerLocation ? prayerLocation.city : 'Toshkent (standart vaqtlar)') + ' · Bugun</div>' +
    '</div>';

  // Countdown to next namoz
  var next = getNextNamoz();
  var msLeft = next.time - now;
  html += '<div class="countdown-card" id="helpCountdownCard">' +
    '<div class="countdown-label">Keyingi namozgacha</div>' +
    '<div class="countdown-time" id="helpCountdown">' + formatCountdown(msLeft) + '</div>' +
    '<div class="countdown-sub"><span class="countdown-next-name">' + next.namoz.name + '</span> · ' + next.namoz.time + '</div>' +
    '</div>';

  // Prayer times detailed cards
  html += '<div class="section-label">Barcha namoz vaqtlari</div>';
  html += '<div class="prayer-times-card">';

  var namozColors = {
    bomdod: { icon: '#6B8ED6', bg: 'rgba(107,142,214,0.1)' },
    peshin: { icon: '#F5C842', bg: 'rgba(245,200,66,0.1)' },
    asr:    { icon: '#8DB8D6', bg: 'rgba(141,184,214,0.1)' },
    shom:   { icon: '#E88A3A', bg: 'rgba(232,138,58,0.1)' },
    xufton: { icon: '#9B7ED6', bg: 'rgba(155,126,214,0.1)' },
  };

  // Header row
  html += '<div class="ptc-header"><div class="ptc-title">Bugungi namoz jadvali</div>' +
    '<div class="ptc-sub">' + (prayerLocation ? prayerLocation.city : 'Toshkent') + ' · ' + now.getDate() + '-' + ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'][now.getMonth()] + '</div></div>';

  NAMOZLAR.forEach(function(n, i) {
    var parts = n.time.split(':');
    var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
    var done = !!ds['n_' + n.id];
    var status = getCurrentNamozStatus(n.id);
    var isNext = next.namoz.id === n.id && !done;
    var desc = NAMOZ_DESCS[n.id] || {};
    var colors = namozColors[n.id] || { icon: 'var(--green)', bg: 'var(--green2)' };

    var rowClass = 'ptc-row';
    if (status === 'current' && !done) rowClass += ' highlight';
    else if (status === 'late' && !done) rowClass += ' late-row';

    // Badge
    var badge = '';
    if (done) badge = '<span class="ptc-badge ptc-badge-done">✓ O\'qildi</span>';
    else if (status === 'current') badge = '<span class="ptc-badge ptc-badge-current">Hozir vaqti</span>';
    else if (status === 'late') badge = '<span class="ptc-badge ptc-badge-late">Kech qolindi</span>';
    else if (isNext) badge = '<span class="ptc-badge ptc-badge-next">Keyingi</span>';
    else badge = '<span class="ptc-badge ptc-badge-waiting">Kutilmoqda</span>';

    // Time until
    var timeInfo = '';
    if (!done && status === 'waiting') {
      var minsLeft = Math.round((nt - now) / 60000);
      if (minsLeft < 60) timeInfo = minsLeft + ' daqiqada';
      else timeInfo = Math.floor(minsLeft/60) + ' soat ' + (minsLeft%60) + ' daqiqada';
    } else if (!done && status === 'current') {
      var minsElapsed = Math.round((now - nt) / 60000);
      var minsRemaining = LATE_AFTER_MIN - minsElapsed;
      timeInfo = minsRemaining + ' daqiqa qoldi';
    } else if (!done && status === 'late') {
      var minsOver = Math.round((now - nt) / 60000);
      timeInfo = minsOver + ' daqiqa o\'tdi';
    } else if (done) {
      timeInfo = 'Bajarildi ✓';
    }

    html += '<div class="' + rowClass + '">' +
      '<div class="ptc-icon" style="background:' + colors.bg + ';color:' + colors.icon + '">' + ICONS[NAMOZ_ICONS[i]] + '</div>' +
      '<div class="ptc-info">' +
        '<div class="ptc-name">' + n.name + '</div>' +
        '<div class="ptc-desc">' + (desc.window || '') + '</div>' +
        badge +
      '</div>' +
      '<div class="ptc-time-col">' +
        '<div class="ptc-time">' + n.time + '</div>' +
        '<div class="ptc-window">' + timeInfo + '</div>' +
      '</div>' +
      '</div>';
  });
  html += '</div>';

  // Source info
  html += '<div class="icon-btn-row">' +
    '<div class="icon-btn" style="opacity:0.7;cursor:default">' + ICONS.pin + ' Toshkent vaqtlari — islom.uz manbasidan</div>' +
    '</div>';

  // Why each namoz section
  html += '<div class="section-label">Har bir namoz nima uchun?</div>';

  var namozWhyColors = ['var(--blue)','var(--amber)','var(--teal)','var(--red)','var(--purple)'];
  NAMOZLAR.forEach(function(n, i) {
    var desc = NAMOZ_DESCS[n.id] || {};
    html += '<div class="help-tip-card" style="border-left-color:' + namozWhyColors[i] + '">' +
      '<div class="help-tip-title" style="color:' + namozWhyColors[i] + '">' +
        '<span>' + ICONS[NAMOZ_ICONS[i]].replace('stroke="currentColor"','stroke="'+namozWhyColors[i]+'"') + '</span>' +
        n.name + ' — ' + n.time +
      '</div>' +
      '<div class="help-tip-body">' + (desc.why || '') + '<br><strong style="color:var(--text3);font-size:10px;margin-top:4px;display:block">Vaqt oynasi: ' + (desc.window || '') + '</strong></div>' +
      '</div>';
  });

  // Tips
  html += '<div class="section-label">Maslahatlar</div>';
  var tips = [
    { title: 'Namozni vaqtida o\'qish', body: 'Har namoz uchun <strong>90 daqiqa</strong> oynasi bor. Vaqt kirishi bilan imkon bo\'lgan tezda o\'qish afzal. Kechiktirish odat bo\'lib qoladi.' },
    { title: 'Qarz emas, tartib', body: 'O\'tkazib yuborilgan namozlar "qarz" sifatida saqlanadi. Maqsad — uni ko\'paytirmaslik, lekin botibdan o\'qish ham qazo hisoblanadi.' },
    { title: 'Eslatmalar yoqish', body: 'Bugun tabidan <strong>Eslatmalar</strong> tugmasini bosib, brauzer bildirishnomalarini yoqing. Har namoz vaqtida signal keladi.' },
    { title: 'Vaqtlar manbayi', body: 'Barcha namoz vaqtlari <strong>islom.uz</strong> saytidan olingan — Toshkent uchun rasmiy va aniq jadval. 23 iyun – 1 sentabr 2026 oralig\'i to\'liq qamrab olingan.' },
    { title: 'Yakshanba — maxsus kun', body: 'Yakshanbada faqat namoz talab qilinadi. Vazifalar bo\'lmaydi. Xohlaganing qil — bu ruhiy tiklanish kuni.' },
  ];
  tips.forEach(function(tip) {
    html += '<div class="help-tip-card">' +
      '<div class="help-tip-title">' + tip.title + '</div>' +
      '<div class="help-tip-body">' + tip.body + '</div>' +
      '</div>';
  });

  document.getElementById('helpContent').innerHTML = html;

  // Live countdown timer
  if (helpCountdownTimer) clearInterval(helpCountdownTimer);
  helpCountdownTimer = setInterval(function() {
    var el = document.getElementById('helpCountdown');
    if (!el) { clearInterval(helpCountdownTimer); return; }
    var nextNow = getNextNamoz();
    var ms = nextNow.time - new Date();
    el.textContent = formatCountdown(ms);
  }, 1000);
}

// ============================================================
// HELPERS
// ============================================================
function renderCurrentPage() {
  if (currentPage === 'today') renderToday();
  else if (currentPage === 'debt') renderDebt();
  else if (currentPage === 'weekly') renderWeekly();
  else if (currentPage === 'journal') renderJournal();
  else if (currentPage === 'stats') renderStats();
  else if (currentPage === 'calendar') renderCalendar();
  else if (currentPage === 'help') renderHelp();
  if (modalKey) renderModal(modalKey);
}

function showToast(msg) {
  var t = document.getElementById('notifToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('modalOverlay').addEventListener('click', function(e){
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalKey = null;
}

// ============================================================
// INIT
// ============================================================
loadSavedPrayerTimes();
setOnline(false);
startFirestoreListener();
if ('Notification' in window && Notification.permission === 'granted') startNotifWatcher();
</script>
