  // Daily progress bars
  html += '<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;">';
  html += '<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:12px;">Bugungi progress</div>';

  var namozPct = Math.round((namozDone/namozTotal)*100);
  var taskPct = Math.round((taskDone/taskTotal)*100);
  html += '<div class="andoza-progress-row">' +
    '<div class="andoza-progress-label">Namoz</div>' +
    '<div class="andoza-progress-bar"><div class="andoza-progress-fill" style="width:'+namozPct+'%;background:var(--green)"></div></div>' +
    '<div class="andoza-progress-pct">'+namozDone+'/'+namozTotal+'</div>' +
    '</div>';
  html += '<div class="andoza-progress-row">' +
    '<div class="andoza-progress-label">Vazifalar</div>' +
    '<div class="andoza-progress-bar"><div class="andoza-progress-fill" style="width:'+taskPct+'%;background:var(--blue)"></div></div>' +
    '<div class="andoza-progress-pct">'+taskDone+'/'+taskTotal+'</div>' +
    '</div>';
  html += '</div>';

  // Schedule table
  html += '<div class="section-label">Jadval</div>';
  html += '<div class="andoza-table">';
  html += '<div class="andoza-table-head">' +
    '<div class="andoza-th">ISH</div>' +
    '<div class="andoza-th" style="color:var(--red);">VAQT</div>' +
    '</div>';

  rows.forEach(function(row, idx) {
    var isActive = idx === activeIdx;
    var isDone = false;
    if (row.type === 'namoz') isDone = !!ds['n_'+row.id];
    else if (row.id === 'js') isDone = !!ds['t_js'];
    else if (row.id === 'vim') isDone = !!ds['t_vim'];
    else if (row.id === 'din') isDone = !!ds['t_din'];

    var isPast = timeToMins(row.endTime) < nowMins && !isActive;

    html += '<div class="andoza-row' + (isActive ? ' andoza-now' : '') + '">';

    // Left cell
    html += '<div class="andoza-cell">' +
      '<div class="andoza-cell-icon" style="background:'+row.iconBg+';color:'+row.iconColor+'">' + ICONS[row.iconKey] + '</div>' +
      '<div>' +
        '<div class="andoza-cell-name" style="' + (isDone ? 'text-decoration:line-through;opacity:0.5' : (isPast&&!isActive ? 'opacity:0.45' : '')) + '">' + row.name + '</div>' +
        '<div class="andoza-cell-sub">' + row.sub + (isDone ? ' ✓' : '') + '</div>' +
      '</div>' +
      '</div>';

    // Right cell
    html += '<div class="andoza-cell">' +
      '<div class="andoza-cell-time">' + row.timeStr + '</div>' +
      '<div class="andoza-cell-dur">' + row.dur + '</div>' +
      '</div>';

    html += '</div>';
  });

  html += '</div>';

  // Tips
  html += '<div class="section-label">Maslahatlar</div>';
  var andozaTips = [
    { title: "Bomdoddan keyingi blok eng muhim", body: "Ertalab 03:30–07:30 — bu <strong>Deep Work</strong> vaqti. Miyangiz eng toza, diqqat eng yuqori. JS ni shu vaqtda oʼrganing." },
    { title: "Namoz bloklari qisqa, lekin zarur", body: "Har namoz uchun 10–20 daqiqa ajratilgan. Namoz oʼqib, 3–5 daqiqa zikr qiling. Keyin ishga qayting." },
    { title: "Vim — alohida 1 soat", body: "Tushdan keyin 13:30–14:30 da Vim kursi. Bu vaqt miyangiz biroz charchagan, ammo mexanik mashq uchun ideal." },
    { title: "Kecha — Quron va Hadis", body: "20:00–22:00 da ekrandan uzoq turing — Quron tilovat qiling, hadis oʼqing. Bu uyqu sifatini oshiradi." },
  ];
  andozaTips.forEach(function(tip){
    html += '<div class="andoza-tip"><strong>' + tip.title + '</strong><br>' + tip.body + '</div>';
  });

  document.getElementById('andozaContent').innerHTML = html;

  // Live clock updater
  if (andozaClockTimer) clearInterval(andozaClockTimer);
  andozaClockTimer = setInterval(function(){
    var el = document.getElementById('andozaClock');
    if (!el) { clearInterval(andozaClockTimer); andozaClockTimer = null; return; }
    var n = new Date();
    el.textContent = pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
  }, 1000);
}

function renderCurrentPage() {
  if (currentPage === 'today') renderToday();
  else if (currentPage === 'debt') renderDebt();
  else if (currentPage === 'weekly') renderWeekly();
  else if (currentPage === 'journal') renderJournal();
  else if (currentPage === 'stats') renderStats();
  else if (currentPage === 'calendar') renderCalendar();
  else if (currentPage === 'help') renderHelp();
  else if (currentPage === 'andoza') renderAndoza();
  if (modalKey) renderModal(modalKey);
}

function showToast(msg) {
  var t = document.getElementById('notifToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function injectTabIcons() {
  Object.keys(TAB_ICONS).forEach(function(key) {
    var tab = document.getElementById('tab-' + key);
    if (!tab) return;
    tab.removeAttribute('data-icon');
    // Wrap existing text in .tab-label
    var text = tab.textContent.trim();
    tab.innerHTML = '';
    var iconSpan = document.createElement('span');
    iconSpan.className = 'tab-icon';
    iconSpan.innerHTML = TAB_ICONS[key];
    var labelSpan = document.createElement('span');
    labelSpan.className = 'tab-label';
    labelSpan.textContent = text;
    tab.appendChild(iconSpan);
    tab.appendChild(labelSpan);
  });
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  var nav = document.querySelector('.top-nav');
  if (!nav) return;
  if (sidebarOpen) {
    nav.classList.remove('collapsed');
  } else {
    nav.classList.add('collapsed');
  }
}

function updateDesktopTitle(id) {
  var el = document.getElementById('desktopPageTitle');
  if (el) el.textContent = PAGE_TITLES[id] || '';
}

// Init on load
document.addEventListener('DOMContentLoaded', function() {
  injectTabIcons();
  updateDesktopTitle('today');
});
// Also run immediately in case DOMContentLoaded already fired
(function() {
  if (document.readyState !== 'loading') {
    injectTabIcons();
    updateDesktopTitle('today');
  }
})();
