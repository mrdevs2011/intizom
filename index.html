<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intizom — MR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='64' height='64' viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%230c0c0c'/%3E%3Cpath d='M12 48L28 32L38 42L52 20' stroke='%231D9E75' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='52' cy='20' r='5' fill='%231D9E75'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1c1c1c;--bg2:#242424;--bg3:#2c2c2c;--bg4:#353535;--bg5:#3d3d3d;
  --sidebar-bg:#202020;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#e8e8e8;--text2:#909090;--text3:#5a5a5a;--text4:#3a3a3a;
  --green:#1D9E75;--green2:rgba(29,158,117,0.14);--green3:rgba(29,158,117,0.07);--teal:#4DBFA0;
  --amber:#E8A020;--amber2:rgba(232,160,32,0.12);
  --red:#D94545;--red2:rgba(217,69,69,0.12);
  --blue:#3A7BD5;--blue2:rgba(58,123,213,0.14);
  --purple:#9B72CF;--purple2:rgba(155,114,207,0.12);
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --font:'Onest',sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar-w:220px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* =============================================
   MOBILE LAYOUT (default)
   ============================================= */
.app{max-width:500px;margin:0 auto;padding:0 0 80px;}

/* Mobile top bar — just brand */
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0;margin-bottom:16px;}
.nav-brand{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.brand-logo{width:28px;height:28px;flex-shrink:0;}
.brand-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.02em;}
.brand-status{display:flex;align-items:center;gap:5px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}
.status-offline{background:var(--red)!important;animation:none!important;}
.status-label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:0.04em;}

/* Mobile: top nav-tabs hidden, bottom bar is used */
.nav-tabs{display:none;}
.nav-tab{display:none;}

/* Mobile bottom nav bar */
.mobile-bottom-nav{
  display:flex;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);
  border-top:0.5px solid var(--border2);
  z-index:100;
  padding:6px 0 env(safe-area-inset-bottom, 6px);
}
.mob-nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:6px 4px;cursor:pointer;
  font-size:9px;font-weight:700;color:var(--text3);
  letter-spacing:0.04em;text-transform:uppercase;
  background:none;border:none;font-family:var(--font);
  transition:color 0.18s;
}
.mob-nav-item svg{width:18px;height:18px;opacity:0.4;transition:opacity 0.18s;}
.mob-nav-item.active{color:var(--green);}
.mob-nav-item.active svg{opacity:1;color:var(--green);}
/* "more" dropdown */
.mob-more-sheet{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:0.5px solid var(--border2);
  padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 70px);
  z-index:99;border-radius:16px 16px 0 0;
}
.mob-more-sheet.open{display:block;}
.mob-more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mob-more-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:12px 6px;background:var(--bg3);border-radius:12px;
  border:0.5px solid var(--border);cursor:pointer;font-size:10px;font-weight:700;
  color:var(--text3);font-family:var(--font);text-transform:uppercase;letter-spacing:0.04em;
}
.mob-more-btn svg{width:18px;height:18px;}
.mob-more-btn.active{background:var(--green2);border-color:rgba(29,158,117,0.35);color:var(--green);}
.mob-more-overlay{display:none;position:fixed;inset:0;z-index:98;background:rgba(0,0,0,0.5);}
.mob-more-overlay.open{display:block;}

/* desktop-main is transparent on mobile */
.desktop-main{display:contents;}
.desktop-topbar{display:none;}
.sidebar-toggle{display:none;}

/* === PAGES — mobile === */
.page{display:none;padding:0 18px;}
.page.active{display:block;}

/* =============================================
   DESKTOP LAYOUT (≥900px)
   ============================================= */
@media(min-width:900px){

  /* Reset mobile bottom nav */
  .mobile-bottom-nav,.mob-more-sheet,.mob-more-overlay{display:none!important;}

  body{overflow:hidden;height:100vh;}

  .app{
    max-width:none;width:100%;height:100vh;
    padding:0;margin:0;
    display:flex;flex-direction:row;
    overflow:hidden;
  }

  /* ---- SIDEBAR ---- */
  .top-nav{
    flex-direction:column;align-items:stretch;
    padding:0;margin-bottom:0;
    border-right:0.5px solid var(--border);
    background:var(--sidebar-bg);
    height:100vh;
    width:220px;
    overflow:hidden;
    transition:width 0.22s cubic-bezier(0.4,0,0.2,1);
    flex-shrink:0;
  }
  /* Collapsed: only icons (48px) */
  .top-nav.collapsed{width:48px;}

  /* Brand area */
  .nav-brand{
    padding:16px 12px 14px;
    border-bottom:0.5px solid var(--border);
    margin-bottom:8px;
    flex-direction:row;align-items:center;gap:10px;
    overflow:hidden;min-width:0;
    flex-shrink:0;
  }
  .brand-logo{flex-shrink:0;}
  .brand-name{font-size:14px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;transition:opacity 0.15s,max-width 0.22s;max-width:160px;}
  .brand-status{flex-shrink:0;gap:6px;transition:opacity 0.15s,max-width 0.22s;max-width:80px;overflow:hidden;}
  .top-nav.collapsed .brand-name{max-width:0;opacity:0;}
  .top-nav.collapsed .brand-status{max-width:0;opacity:0;}

  /* Nav tabs */
  .nav-tabs{
    display:flex;flex-direction:column;
    background:none;border-radius:0;
    padding:4px 6px 20px;
    gap:2px;border:none;overflow:visible;
  }
  .nav-tab{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:9px;
    font-size:12px;font-weight:600;
    color:var(--text3);letter-spacing:0.005em;
    text-align:left;white-space:nowrap;
    background:none;border:none;cursor:pointer;
    font-family:var(--font);
    transition:background 0.15s,color 0.15s;
    overflow:hidden;min-width:0;
  }
  .nav-tab .tab-icon{
    width:16px;height:16px;flex-shrink:0;opacity:0.4;transition:opacity 0.15s;
  }
  .nav-tab .tab-label{
    white-space:nowrap;overflow:hidden;
    transition:opacity 0.12s,max-width 0.22s;
    max-width:160px;
  }
  /* Collapsed: hide label */
  .top-nav.collapsed .nav-tab .tab-label{max-width:0;opacity:0;}
  .top-nav.collapsed .nav-tab{padding:9px 0;justify-content:center;gap:0;}

  .nav-tab:hover{background:var(--bg3);color:var(--text2);}
  .nav-tab:hover .tab-icon{opacity:0.8;}
  .nav-tab.active{background:var(--green2);color:var(--green);}
  .nav-tab.active .tab-icon{opacity:1;color:var(--green);}
  .nav-tab::before{content:none!important;}

  /* Sidebar toggle button */
  .sidebar-toggle{
    display:flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:8px;
    background:var(--bg3);border:0.5px solid var(--border2);
    cursor:pointer;color:var(--text2);flex-shrink:0;
    transition:background 0.15s,color 0.15s;
  }
  .sidebar-toggle:hover{background:var(--bg4);color:var(--text);}
  .sidebar-toggle svg{width:16px;height:16px;}

  /* Desktop top bar */
  .desktop-topbar{
    display:flex;align-items:center;gap:12px;
    padding:0 0 20px;
    border-bottom:0.5px solid var(--border);
    margin-bottom:24px;
    flex-shrink:0;
  }
  .desktop-page-title{
    font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.02em;flex:1;
  }

  /* Main content area */
  .desktop-main{
    display:flex;flex-direction:column;
    flex:1;min-width:0;
    height:100vh;overflow-y:auto;
    padding:28px 36px;
  }

  .page{display:none;padding:0;max-width:900px;width:100%;}
  .page.active{display:block;}

  .stats-mini{grid-template-columns:repeat(3,1fr);}
  .stats-big-grid{grid-template-columns:repeat(4,1fr);}
  .namoz-grid{grid-template-columns:repeat(5,1fr);}
}

@media(min-width:1300px){
  .desktop-main{padding:32px 48px;}
}

/* === CONNECTION BANNER === */
.conn-banner{background:var(--red2);border:0.5px solid rgba(217,69,69,0.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;display:none;align-items:center;gap:10px;}
.conn-banner.show{display:flex;}
.conn-banner-text{font-size:12px;color:var(--red);font-weight:600;}
.conn-banner-sub{font-size:11px;color:rgba(217,69,69,0.6);}
.reconnect-btn{margin-left:auto;background:rgba(217,69,69,0.2);border:0.5px solid rgba(217,69,69,0.4);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--red);cursor:pointer;font-family:var(--font);white-space:nowrap;}

/* === HEADER CARD === */
.header-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:0.5px solid var(--border2);border-radius:var(--radius);padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.header-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(29,158,117,0.08) 0%,transparent 70%);pointer-events:none;}
.streak-row{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
.streak-num{font-size:64px;font-weight:800;color:var(--green);line-height:1;font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.04em;}
.streak-suffix{font-size:15px;color:var(--text3);font-weight:400;}

/* === STATS MINI === */
.stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-mini{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;}
.stat-mini-val{font-size:20px;font-weight:700;color:var(--text2);font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
.stat-mini-lbl{font-size:9px;color:var(--text4);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}

/* === SECTION LABEL === */
.section-label{font-size:10px;color:var(--text4);letter-spacing:0.06em;text-transform:uppercase;margin:22px 0 8px;font-weight:600;display:flex;align-items:center;gap:8px;}
.section-label::after{display:none;}

/* === PRAYER TIME CARD === */
.prayer-location-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.prayer-location-icon{width:20px;height:20px;flex-shrink:0;color:var(--text3);}
.prayer-location-text{font-size:12px;color:var(--text3);flex:1;}
.prayer-location-val{font-size:12px;color:var(--text2);font-family:var(--mono);}
.prayer-fetch-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--green);font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;}

/* === NAMOZ GRID === */
.namoz-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.namoz-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 4px;text-align:center;cursor:pointer;transition:all 0.18s;user-select:none;position:relative;}
.namoz-card:active{transform:scale(0.93);}
.namoz-card.done{border-color:var(--green);background:var(--green2);}
.namoz-card.locked{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.namoz-card.late:not(.done){border-color:var(--red);background:var(--red2);}
.namoz-card.current:not(.done){border-color:var(--amber);background:var(--amber2);}
.namoz-icon{width:22px;height:22px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;}
.namoz-icon svg{width:18px;height:18px;opacity:0.5;}
.namoz-card.done .namoz-icon svg{opacity:1;}
.namoz-name{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;}
.namoz-card.done .namoz-name{color:var(--teal);}
.namoz-card.late:not(.done) .namoz-name{color:var(--red);}
.namoz-card.current:not(.done) .namoz-name{color:var(--amber);}
.namoz-time{font-size:12px;font-weight:800;color:var(--text);margin-top:4px;font-family:var(--mono);}

/* === TASKS === */
.tasks-list{display:flex;flex-direction:column;gap:7px;}
.task-item{display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.18s;user-select:none;}
.task-item:active{transform:scale(0.99);}
.task-item.done{border-color:var(--green);background:var(--green3);}
.task-item.done .task-name{color:var(--text3);text-decoration:line-through;}
.task-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.task-circle svg{width:11px;height:11px;opacity:0;transition:opacity 0.2s;}
.task-item.done .task-circle{background:var(--green);border-color:var(--green);}
.task-item.done .task-circle svg{opacity:1;}
.task-info{flex:1;}
.task-name{font-size:15px;font-weight:700;color:var(--text);}
.task-meta{font-size:10px;color:var(--text4);margin-top:3px;font-family:var(--mono);}
.task-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;font-family:var(--mono);letter-spacing:0.04em;}
.badge-js{background:rgba(58,123,213,0.15);color:#7AAAF0;}
.badge-vim{background:rgba(140,130,240,0.15);color:#BEB8F5;}
.badge-din{background:rgba(232,160,32,0.15);color:#F0C870;}

/* === BANNERS === */
.sunday-banner{background:var(--amber2);border:0.5px solid rgba(232,160,32,0.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
.sunday-title{font-size:15px;font-weight:700;color:var(--amber);margin-bottom:3px;}
.sunday-sub{font-size:12px;color:rgba(232,160,32,0.55);}
.debt-banner{background:var(--red2);border:0.5px solid rgba(217,69,69,0.25);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;cursor:pointer;}
.debt-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.debt-sub{font-size:11px;color:rgba(217,69,69,0.6);line-height:1.5;}
.quote-card{background:var(--bg2);border:0.5px solid var(--border);border-left:2px solid var(--green);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.6;color:var(--text2);font-style:italic;}

/* === CHART === */
.chart-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 14px 12px;margin-bottom:14px;}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:80px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:5px;}
.chart-bar{width:100%;max-width:20px;border-radius:3px 3px 1px 1px;transition:height 0.5s cubic-bezier(0.4,0,0.2,1);min-height:2px;}
.chart-bar.full{background:var(--green);}
.chart-bar.part{background:var(--green2);border:0.5px solid var(--teal);}
.chart-bar.none{background:var(--bg4);}
.chart-lbl{font-size:8px;color:var(--text3);font-family:var(--mono);}

/* === CALENDAR === */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month-label{font-size:14px;font-weight:700;color:var(--text);}
.cal-nav-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:background 0.15s;}
.cal-nav-btn:hover{background:var(--bg4);}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px;}
.cal-wd{font-size:9px;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:0.08em;font-weight:600;font-family:var(--mono);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{aspect-ratio:1;border-radius:9px;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);background:var(--bg2);cursor:pointer;transition:all 0.15s;font-family:var(--mono);}
.cal-day:active{transform:scale(0.91);}
.cal-day.empty,.cal-day.outside-range{background:none;border-color:transparent;cursor:default;pointer-events:none;opacity:0.1;}
.cal-day.future{opacity:0.15;cursor:default;pointer-events:none;}
.cal-day.today{border-color:var(--green);color:var(--green);font-weight:800;}
.cal-day.completed{background:var(--green);border-color:var(--green);color:#fff;font-weight:800;}
.cal-day.partial{background:var(--green2);border-color:rgba(77,191,160,0.5);color:var(--teal);}
.cal-day.failed{background:var(--red2);border-color:rgba(217,69,69,0.2);color:var(--red);}
.cal-day.sunday-rest{background:var(--amber2);border-color:rgba(232,160,32,0.2);color:var(--amber);}
.cal-legend{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);}
.cal-legend-dot{width:9px;height:9px;border-radius:3px;}

/* === STATS PAGE === */
.stats-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.stat-big{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px 16px;}
.stat-big-val{font-size:32px;font-weight:800;font-family:var(--mono);color:var(--text);letter-spacing:-0.03em;line-height:1;}
.stat-big-lbl{font-size:10px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;}
.stat-big-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
.stat-big.accent-green .stat-big-val{color:var(--green);}
.stat-big.accent-amber .stat-big-val{color:var(--amber);}
.stat-big.accent-red .stat-big-val{color:var(--red);}
.stat-big.accent-blue .stat-big-val{color:var(--blue);}
.namoz-stats-table{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;}
.nst-row{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border);}
.nst-row:last-child{border-bottom:none;}
.nst-icon{width:24px;height:24px;flex-shrink:0;margin-right:12px;display:flex;align-items:center;justify-content:center;}
.nst-icon svg{width:16px;height:16px;}
.nst-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.nst-bar-wrap{flex:2;height:4px;background:var(--bg4);border-radius:2px;margin:0 12px;}
.nst-bar-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.6s ease;}
.nst-pct{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--text2);width:36px;text-align:right;}

/* === DEBT PAGE === */
.debt-page-header{background:var(--red2);border:0.5px solid rgba(217,69,69,0.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;}
.debt-page-title{font-size:18px;font-weight:800;color:var(--red);margin-bottom:3px;}
.debt-page-sub{font-size:12px;color:rgba(217,69,69,0.5);}
.debt-filters{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.debt-filters::-webkit-scrollbar{display:none;}
.debt-filter{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:var(--font);}
.debt-filter.active{background:var(--red2);border-color:rgba(217,69,69,0.4);color:var(--red);}
.debt-group{margin-bottom:14px;}
.debt-group-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:7px;padding:0 2px;}
.debt-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--bg2);border:0.5px solid rgba(217,69,69,0.15);border-radius:var(--radius-sm);margin-bottom:6px;}
.debt-item-day{font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);min-width:60px;}
.debt-item-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.debt-item-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-family:var(--mono);font-weight:700;}
.debt-badge-namoz{background:rgba(232,160,32,0.12);color:var(--amber);}
.debt-badge-task{background:var(--blue2);color:#7AAAF0;}
.debt-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.debt-empty-icon{font-size:32px;margin-bottom:10px;}

/* === WEEKLY REVIEW === */
.weekly-review-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;}
.wr-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.wr-week-label{font-size:14px;font-weight:700;color:var(--text);}
.wr-nav-btn{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;transition:background 0.15s;}
.wr-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.wr-day-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
.wr-day-lbl{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:0.04em;}
.wr-day-circle{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:var(--mono);cursor:pointer;transition:all 0.15s;}
.wr-day-circle.full{background:var(--green);color:#fff;}
.wr-day-circle.part{background:var(--green2);border:0.5px solid var(--teal);color:var(--teal);}
.wr-day-circle.failed{background:var(--red2);border:0.5px solid rgba(217,69,69,0.2);color:var(--red);}
.wr-day-circle.sunday{background:var(--amber2);border:0.5px solid rgba(232,160,32,0.2);color:var(--amber);}
.wr-day-circle.future{background:var(--bg4);color:var(--text4);}
.wr-day-circle.out{opacity:0.2;pointer-events:none;}
.wr-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.wr-stat{text-align:center;}
.wr-stat-val{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--text);}
.wr-stat-lbl{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;}
.wr-journal-section{border-top:0.5px solid var(--border);padding-top:14px;}
.wr-journal-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.wr-journal-textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;}
.wr-journal-textarea:focus{border-color:var(--border2);}
.wr-journal-textarea::placeholder{color:var(--text3);}
.wr-journal-save{margin-top:8px;width:100%;padding:11px;background:var(--green2);border:0.5px solid rgba(29,158,117,0.3);border-radius:9px;color:var(--green);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background 0.15s;}
.wr-journal-save:hover{background:rgba(29,158,117,0.2);}

/* === JOURNAL PAGE === */
.journal-search{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color 0.2s;margin-bottom:12px;}
.journal-search:focus{border-color:var(--border2);}
.journal-search::placeholder{color:var(--text3);}
.journal-entry{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;}
.journal-entry:hover{border-color:var(--border2);}
.journal-entry-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.journal-entry-day{font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);}
.journal-entry-date{font-size:12px;color:var(--text2);flex:1;}
.journal-entry-badge{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.journal-entry-text{font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.journal-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.journal-entry-edit{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;margin-top:10px;display:none;}
.journal-entry-edit.open{display:block;}
.journal-entry.expanded{border-color:var(--border2);}
.journal-entries-list{display:flex;flex-direction:column;gap:8px;margin:10px 0;}
.journal-entry-item{background:var(--bg3);border:0.5px solid var(--border);border-radius:9px;padding:10px 12px;}
.journal-entry-item-time{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:4px;letter-spacing:0.03em;}
.journal-entry-item-text{font-size:13px;color:var(--text2);line-height:1.55;white-space:pre-wrap;}

/* === HELP PAGE === */
.help-header{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:0.5px solid var(--border2);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.help-header-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-0.02em;}
.help-header-sub{font-size:13px;color:var(--text3);line-height:1.5;}

.prayer-times-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.ptc-header{padding:14px 16px 10px;border-bottom:0.5px solid var(--border);}
.ptc-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:2px;}
.ptc-sub{font-size:11px;color:var(--text3);}
.ptc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--border);transition:background 0.15s;}
.ptc-row:last-child{border-bottom:none;}
.ptc-row.highlight{background:var(--green2);border-color:rgba(29,158,117,0.2);}
.ptc-row.late-row{background:var(--red2);}
.ptc-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ptc-icon svg{width:16px;height:16px;}
.ptc-info{flex:1;}
.ptc-name{font-size:14px;font-weight:700;color:var(--text);}
.ptc-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.ptc-time-col{text-align:right;}
.ptc-time{font-size:18px;font-weight:800;color:var(--text);font-family:var(--mono);letter-spacing:-0.02em;}
.ptc-window{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono);}
.ptc-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:var(--mono);margin-top:4px;display:inline-block;}
.ptc-badge-current{background:rgba(29,158,117,0.2);color:var(--green);}
.ptc-badge-late{background:rgba(217,69,69,0.15);color:var(--red);}
.ptc-badge-next{background:rgba(232,160,32,0.15);color:var(--amber);}
.ptc-badge-done{background:rgba(77,191,160,0.15);color:var(--teal);}
.ptc-badge-waiting{background:var(--bg4);color:var(--text3);}

.countdown-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;text-align:center;}
.countdown-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;}
.countdown-time{font-size:38px;font-weight:800;color:var(--text);font-family:var(--mono);letter-spacing:-0.02em;line-height:1;}
.countdown-sub{font-size:12px;color:var(--text3);margin-top:6px;}
.countdown-next-name{color:var(--green);font-weight:700;}

.help-tip-card{background:var(--bg2);border:0.5px solid var(--border);border-left:2px solid var(--green);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.help-tip-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:7px;}
.help-tip-body{font-size:12px;color:var(--text3);line-height:1.7;}
.help-tip-body strong{color:var(--text2);}

.day-schedule-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dsg-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;}
.dsg-time{font-size:11px;font-weight:700;color:var(--green);font-family:var(--mono);margin-bottom:4px;}
.dsg-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.dsg-desc{font-size:11px;color:var(--text3);line-height:1.5;}

/* === MODAL === */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;border:0.5px solid var(--border2);border-bottom:none;width:100%;max-width:500px;padding:20px 20px 44px;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s cubic-bezier(0.4,0,0.2,1);}
@keyframes slideUp{from{transform:translateY(50px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:34px;height:3px;border-radius:2px;background:var(--bg5);margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-0.02em;}
.modal-date{font-size:12px;color:var(--text3);margin-bottom:18px;font-family:var(--mono);}
.modal-namoz-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px;}
.modal-namoz{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 4px;text-align:center;cursor:pointer;transition:all 0.18s;user-select:none;}
.modal-namoz:active{transform:scale(0.91);}
.modal-namoz.done{border-color:var(--green);background:var(--green2);}
.modal-namoz.locked{opacity:0.25;cursor:not-allowed;pointer-events:none;}
.mn-icon{width:20px;height:20px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;}
.mn-icon svg{width:14px;height:14px;opacity:0.5;}
.modal-namoz.done .mn-icon svg{opacity:1;}
.mn-name{font-size:8px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;font-weight:700;}
.mn-time{font-size:10px;font-weight:700;color:var(--text);margin-top:2px;font-family:var(--mono);}
.modal-tasks{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.modal-task{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:0.5px solid var(--border);border-radius:11px;cursor:pointer;transition:all 0.18s;user-select:none;}
.modal-task:active{transform:scale(0.99);}
.modal-task.done{border-color:var(--green);}
.modal-task.done .mt-name{text-decoration:line-through;color:var(--text3);}
.mt-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.mt-circle svg{width:10px;height:10px;opacity:0;}
.modal-task.done .mt-circle{background:var(--green);border-color:var(--green);}
.modal-task.done .mt-circle svg{opacity:1;}
.mt-info{flex:1;}
.mt-name{font-size:13px;font-weight:600;color:var(--text);}
.mt-meta{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono);}
.modal-journal{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;min-height:64px;margin-bottom:14px;outline:none;transition:border-color 0.2s;}
.modal-journal:focus{border-color:var(--border2);}
.modal-journal::placeholder{color:var(--text3);}
.modal-locked-banner{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.modal-locked-icon{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.modal-locked-icon svg{width:16px;height:16px;color:var(--text3);}
.modal-locked-text{font-size:12px;color:var(--text3);}
.modal-close{width:100%;padding:13px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:11px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background 0.15s;}
.modal-close:hover{background:var(--bg4);}

/* === ICON BTN ROW === */
.icon-btn-row{display:flex;gap:7px;margin-bottom:14px;}
.icon-btn{flex:1;background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:11px 10px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);}
.icon-btn svg{width:14px;height:14px;flex-shrink:0;}
.icon-btn:hover{background:var(--bg3);color:var(--text);}

/* === LOADING === */
.loading{display:flex;align-items:center;justify-content:center;height:220px;color:var(--text3);font-size:13px;flex-direction:column;gap:14px;}
.spinner{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg4);border-top-color:var(--green);animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* === TOAST === */
.notif-toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--text);z-index:300;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;font-family:var(--mono);}
.notif-toast.show{opacity:1;}

/* === SAVING INDICATOR === */
.saving-pill{position:fixed;bottom:20px;right:18px;background:var(--green);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
.saving-pill.show{opacity:1;}

/* === ANDOZA PAGE === */
.andoza-header{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:0.5px solid var(--border2);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.andoza-header-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-0.02em;}
.andoza-header-sub{font-size:13px;color:var(--text3);line-height:1.5;}
.andoza-table{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.andoza-table-head{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border2);}
.andoza-th{padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;}
.andoza-th:first-child{color:var(--green);border-right:0.5px solid var(--border2);}
.andoza-th:last-child{color:var(--red);}
.andoza-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border);}
.andoza-row:last-child{border-bottom:none;}
.andoza-row:hover{background:rgba(255,255,255,0.02);}
.andoza-cell{padding:14px 16px;}
.andoza-cell:first-child{border-right:0.5px solid var(--border);display:flex;align-items:center;gap:10px;}
.andoza-cell-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.andoza-cell-icon svg{width:14px;height:14px;}
.andoza-cell-name{font-size:14px;font-weight:600;color:var(--text);}
.andoza-cell-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.andoza-cell-time{font-size:15px;font-weight:700;color:var(--text);font-family:var(--mono);letter-spacing:-0.01em;}
.andoza-cell-dur{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);}
.andoza-now{background:var(--green2);border-left:2px solid var(--green);}
.andoza-now .andoza-cell-time{color:var(--green);}
.andoza-tip{background:var(--bg2);border:0.5px solid var(--border);border-left:2px solid var(--amber);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;font-size:12px;color:var(--text3);line-height:1.7;}
.andoza-tip strong{color:var(--text2);}
.andoza-progress-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.andoza-progress-label{font-size:12px;color:var(--text2);font-weight:600;min-width:90px;}
.andoza-progress-bar{flex:1;height:5px;background:var(--bg4);border-radius:3px;}
.andoza-progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.andoza-progress-pct{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:30px;text-align:right;}
.andoza-live-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green2);border:0.5px solid rgba(29,158,117,0.3);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--green);font-family:var(--mono);}
.andoza-live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
</style>
</head>
<body>
<div class="app">
  <div class="top-nav">
    <div class="nav-brand">
      <svg class="brand-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#111"/>
        <path d="M12 48L28 32L38 42L52 20" stroke="#1D9E75" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="52" cy="20" r="5" fill="#1D9E75"/>
      </svg>
      <span class="brand-name">Intizom — MR</span>
      <div class="brand-status" style="margin-left:4px;">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">sync</span>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-today" data-icon="☀️" onclick="APP.showPage('today')">Bugun</button>
      <button class="nav-tab" id="tab-debt" data-icon="⚠️" onclick="APP.showPage('debt')">Qarz</button>
      <button class="nav-tab" id="tab-weekly" data-icon="📊" onclick="APP.showPage('weekly')">Hafta</button>
      <button class="nav-tab" id="tab-journal" data-icon="📓" onclick="APP.showPage('journal')">Jurnal</button>
      <button class="nav-tab" id="tab-stats" data-icon="📈" onclick="APP.showPage('stats')">Statistika</button>
      <button class="nav-tab" id="tab-calendar" data-icon="📅" onclick="APP.showPage('calendar')">Kalendar</button>
      <button class="nav-tab" id="tab-help" data-icon="🕌" onclick="APP.showPage('help')">Namoz vaqtlari</button>
      <button class="nav-tab" id="tab-andoza" data-icon="🗓" onclick="APP.showPage('andoza')">Andoza</button>
    </div>
  </div>

  <!-- Desktop: pages go inside this scrollable container -->
  <div class="desktop-main" id="desktopMain">
    <div class="desktop-topbar" id="desktopTopbar">
      <button class="sidebar-toggle" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="desktop-page-title" id="desktopPageTitle">Bugun</span>
    </div>

    <div class="page active" id="page-today">
      <div id="connBanner" class="conn-banner">
        <div><div class="conn-banner-text">Ulanish yo'q</div><div class="conn-banner-sub">Ma'lumotlar saqlanmayapti</div></div>

  var ds = state[key] || {};
  var any = NAMOZLAR.some(function(n){ return ds['n_' + n.id]; }) ||
            TASKS.some(function(t){ return ds['t_' + t.id]; });
  return any && !isDayComplete(key);
}
function getStreak() {
  var streak = 0;
  var today = new Date();
  var tk = todayKey();
  for (var i = 0; i < TOTAL_DAYS; i++) {
    var d = new Date(today); d.setDate(d.getDate() - i);
    if (d < START) break;
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (isDayComplete(key)) streak++;
    else if (key !== tk) break;
  }
  return streak;
}
function getTotalComplete() {
  var today = new Date();
  var count = 0;
  Object.keys(state).forEach(function(k){
    var d = keyToDate(k);
    if (d >= START && d <= today && isDayComplete(k)) count++;
  });
  return count;
}
function getDebtItems() {
  var debts = [];
  var today = new Date();
  var tk = todayKey();
  for (var i = 1; i <= TOTAL_DAYS; i++) {
    var d = new Date(today); d.setDate(d.getDate() - i);
    if (d < START) break;
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (key === tk) continue;
    var ds = state[key] || {};
    NAMOZLAR.forEach(function(n){
      if (!ds['n_' + n.id]) debts.push({ key: key, name: n.name, type: 'namoz' });
    });
    if (!isSunday(key)) {
      TASKS.forEach(function(t){
        if (!ds['t_' + t.id]) debts.push({ key: key, name: t.name, type: 'task' });
      });
    }
  }
  return debts;
}
function getNamozStats() {
  var counts = {};
  NAMOZLAR.forEach(function(n){ counts[n.id] = { done: 0, total: 0 }; });
  var today = new Date();
  var tk = todayKey();
  var startStr = START.toISOString().slice(0,10);
  var d = new Date(START);
  while (d <= today) {
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (key <= tk && key >= startStr) {
      var ds = state[key] || {};
      NAMOZLAR.forEach(function(n){
        counts[n.id].total++;
        if (ds['n_' + n.id]) counts[n.id].done++;
      });
    }
    d.setDate(d.getDate() + 1);
  }
  return counts;
}
function getWeekDays(offset) {
  var today = new Date();
  var dow = today.getDay();
  var mon = new Date(today);
  mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(d);
  }
  return days;
}

function getNextNamoz() {
  var now = new Date();
  for (var i = 0; i < NAMOZLAR.length; i++) {
    var n = NAMOZLAR[i];
    var parts = n.time.split(':');
    var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
    if (now < nt) return { namoz: n, time: nt, index: i };
  }
  // Next day bomdod
  var bomdod = NAMOZLAR[0];
  var parts = bomdod.time.split(':');
  var nt = new Date(); nt.setDate(nt.getDate() + 1);
  nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  return { namoz: bomdod, time: nt, index: 0 };
}

function getCurrentNamozStatus(namozId) {
  var now = new Date();
  var idx = NAMOZLAR.findIndex(function(x){ return x.id === namozId; });
  if (idx < 0) return 'waiting';
  var n = NAMOZLAR[idx];
  var parts = n.time.split(':');
  var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
  if (now < nt) return 'waiting';
  var diff = (now - nt) / 60000;
  if (diff <= LATE_AFTER_MIN) return 'current';
  return 'late';
}

function formatCountdown(ms) {
  if (ms <= 0) return '00:00:00';
  var totalSec = Math.floor(ms / 1000);
  var h = Math.floor(totalSec / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  var s = totalSec % 60;
  return pad(h) + ':' + pad(m) + ':' + pad(s);
}

function setOnline(on) {
  isOnline = on;
  var dot = document.getElementById('statusDot');
  var lbl = document.getElementById('statusLabel');
  var banner = document.getElementById('connBanner');
  if (dot && lbl) {
    if (on) { dot.classList.remove('status-offline'); lbl.textContent = 'sync'; }
    else { dot.classList.add('status-offline'); lbl.textContent = 'offline'; }
  }
  if (banner) banner.classList.toggle('show', !on);
}
function startFirestoreListener() {
  if (!db) { setOnline(false); renderCurrentPage(); return; }
  if (unsubscribe) { try { unsubscribe(); } catch(e){} }
  var fm = window.__fm;
  if (!fm) { setOnline(false); renderCurrentPage(); return; }
  try {
    var colRef = fm.collection(db, 'users', USER_ID, 'days');
    unsubscribe = fm.onSnapshot(colRef,
      function(snapshot) {
        // Adblocker cache dan javob berishi mumkin — haqiqiy online emas
        setOnline(!_adblockDetected);
        snapshot.docChanges().forEach(function(change) {
          if (change.type === 'removed') delete state[change.doc.id];
          else state[change.doc.id] = change.doc.data();
        });
        renderCurrentPage();
      },
      function(err) {
        setOnline(false);
        var msg = err ? (err.message || '') : '';
        var isBlocked = _adblockDetected ||
          msg.indexOf('BLOCKED') > -1 ||
          msg.indexOf('ERR_BLOCKED') > -1 ||
          (err && err.code === 'unavailable');
        if (isBlocked) {
          showToast("Reklama bloker aniqlandi — offline rejimda ishlayapsiz.");
        } else if (err && err.code) {
          showToast("Ulanish xatosi: " + (err.code || 'nomalum'));
        }
        renderCurrentPage();
      }
    );
    // Haftalik jurnal — alohida collection ('weekly'), chunki dayId
    // formati ('YYYY-MM-DD') ga to'g'ri kelmaydi. Local state'da
    // moslik uchun '_week_' prefiksi bilan saqlanadi (eski kalit nomi).
    if (unsubscribeWeekly) { try { unsubscribeWeekly(); } catch(e){} }
    var weeklyColRef = fm.collection(db, 'users', USER_ID, 'weekly');
    unsubscribeWeekly = fm.onSnapshot(weeklyColRef,
      function(snapshot) {
        snapshot.docChanges().forEach(function(change) {
          if (change.type === 'removed') delete state['_week_' + change.doc.id];
          else state['_week_' + change.doc.id] = change.doc.data();
        });
        renderCurrentPage();
      },
      function(err) { /* kichik bo'lim — asosiy bannerga ta'sir qilmasin */ }
    );
  } catch(e) { setOnline(false); renderCurrentPage(); }
}

function saveDay(key, data) {
  var fm = window.__fm;
  if (!db || !fm) { showToast("Firebase yuklanmadi."); return; }
  if (!isOnline) { showToast("Offline. Ma'lumot cache ga saqlandi."); return; }
  showSaving();
  var docRef = fm.doc(db, 'users', USER_ID, 'days', key);
  fm.setDoc(docRef, data, { merge: true })
    .then(function(){ hideSaving(); })
    .catch(function(err){
      hideSaving();
      var emsg = err ? (err.message || '') : '';
      if (_adblockDetected || emsg.indexOf('BLOCKED') > -1 ||
          emsg.indexOf('ERR_BLOCKED') > -1 || (err && err.code === 'unavailable')) {
        showToast("Offline saqlash: reklama bloker to'sgan, lokal keshda.");
      } else {
        showToast('Saqlash xatosi: ' + (err.message || err));
      }
    });
}
function showSaving() {
  var pill = document.getElementById('savingPill');
  if (pill) { pill.textContent = 'Saqlanmoqda...'; pill.classList.add('show'); }
}
function hideSaving() {
  var pill = document.getElementById('savingPill');
  if (!pill) return;
  pill.textContent = 'Saqlandi ✓';
  if (savingTimer) clearTimeout(savingTimer);
  savingTimer = setTimeout(function(){ pill.classList.remove('show'); }, 1400);
}

function startNotifWatcher() {
  if (notifTimer) clearInterval(notifTimer);
  var notified = {};
  notifTimer = setInterval(function(){
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    var now = new Date();
    var tk = todayKey();
    NAMOZLAR.forEach(function(n){
      var parts = n.time.split(':');
      var nt = new Date(); nt.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
      var diffMin = (now - nt) / 60000;
      var flagKey = tk + '_' + n.id;
      if (diffMin >= 0 && diffMin < 1 && !notified[flagKey]) {
        notified[flagKey] = true;
        var ds = state[tk] || {};
        if (!ds['n_' + n.id]) new Notification('Intizom — ' + n.name, { body: n.name + ' namozi vaqti keldi (' + n.time + ').' });
      }
    });
  }, 30000);
}

function renderToday() {
  var tk = todayKey();

  var streak = getStreak();
  var totalDone = getTotalComplete();
  var namozDone = NAMOZLAR.filter(function(n){ return ds['n_' + n.id]; }).length;
  var sunday = isSunday(tk);
  var daysPassed = Math.max(0, Math.round((new Date() - START) / 86400000));
  var successPct = daysPassed > 0 ? Math.round((totalDone / daysPassed) * 100) : 0;
  var debts = getDebtItems();

  var html = '';
  html += '<div class="header-card">' +
    '<div class="streak-row"><span class="streak-num">' + streak + '</span><span class="streak-suffix">kun ketma-ket</span></div>' +
    '</div>';

  html += '<div class="quote-card">' + dailyQuote() + '</div>';

  html += '<div class="stats-mini">' +
    '<div class="stat-mini"><div class="stat-mini-val">' + namozDone + '/5</div><div class="stat-mini-lbl">Bugun namoz</div></div>' +
    '<div class="stat-mini"><div class="stat-mini-val">' + totalDone + '</div><div class="stat-mini-lbl">Mukammal kun</div></div>' +
    '<div class="stat-mini"><div class="stat-mini-val">' + successPct + '%</div><div class="stat-mini-lbl">Natija</div></div>' +
    '</div>';

  if (debts.length > 0) {
    html += '<div class="debt-banner" onclick="APP.showPage(\'debt\')">' +
      '<div class="debt-title"><span style="display:inline-flex;width:16px;height:16px;color:var(--red)">' + ICONS.warn + '</span>' + debts.length + ' ta qarz — ko\'rish →</div>' +
      '<div class="debt-sub">O\'tgan kunlarda bajarilmagan namoz/vazifalar.</div>' +
      '</div>';
  }

  if (sunday) {
    html += '<div class="sunday-banner"><div class="sunday-title">Yakshanba — dam olish kuni</div>' +
      '<div class="sunday-sub">Faqat namoz. Xohlaganing qil. Yaxshi hordiq!</div></div>';
  }

  html += '<div class="prayer-location-card">' +
    '<div class="prayer-location-icon">' + ICONS.pin + '</div>' +
    '<div class="prayer-location-text">Andijon vaqtlari</div>' +
    '<div class="prayer-location-val" style="color:var(--green);font-size:10px;font-weight:700;">islom.uz ✓</div>' +
    '</div>';

  html += '<div class="section-label">Namozlar</div><div class="namoz-grid">';
  NAMOZLAR.forEach(function(n, i) {
    var done = !!ds['n_' + n.id];
    var locked = isNamozLocked(n.id, tk);
    var late = !done && isNamozLate(n.id, tk);
    var current = !done && isNamozCurrent(n.id, tk);
    var iconKey = NAMOZ_ICONS[i];
    var cardClass = 'namoz-card ' + (done?'done ':'') + (locked?'locked ':'') + (late?'late ':' ') + (current&&!late?'current':'');
    html += '<div class="' + cardClass.trim() + '" onclick="APP.toggleNamoz(\'' + n.id + '\',\'' + tk + '\')">' +
      '<div class="namoz-icon" style="color:' + (done?'var(--green)':(late?'var(--red)':(current?'var(--amber)':'var(--text3)'))) + '">' +
        (done ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>'
              : (locked ? ICONS.lock : ICONS[iconKey])) +
      '</div>' +
      '<div class="namoz-name">' + n.name + '</div>' +
      '<div class="namoz-time">' + n.time + '</div></div>';
  });
  html += '</div>';

  if (!sunday) {
    html += '<div class="section-label">Vazifalar</div><div class="tasks-list">';
    TASKS.forEach(function(t) {
      var done = !!ds['t_' + t.id];
      html += '<div class="task-item ' + (done?'done':'') + '" onclick="APP.toggleTask(\'' + t.id + '\',\'' + tk + '\')">' +
        '<div class="task-circle"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<div class="task-info"><div class="task-name">' + t.name + '</div><div class="task-meta">' + t.meta + '</div></div>' +
        '<span class="task-badge ' + t.badge + '">' + t.label + '</span></div>';
    });
    html += '</div>';
  }

  html += '<div class="section-label">Boshqaruv</div>' +
    '<div class="icon-btn-row">' +
    '<div class="icon-btn" onclick="APP.requestNotif()">' + ICONS.bell + ' Eslatmalar</div>' +
    '<div class="icon-btn" onclick="APP.exportData()">' + ICONS.download + ' Backup</div>' +
    '</div>';

  html += renderChartCard();
  document.getElementById('todayContent').innerHTML = html;
}

function renderChartCard() {
  var days = [];
  var today = new Date();
  for (var i = 13; i >= 0; i--) {
    var d = new Date(today); d.setDate(d.getDate() - i);
    if (d < START) continue;
    days.push(d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()));
  }
  var dayLabels = ['Ya','Du','Se','Ch','Pa','Ju','Sh'];
  var html = '<div class="section-label">So\'nggi 14 kun</div><div class="chart-card"><div class="chart-bars">';
  days.forEach(function(key){
    var ds = state[key] || {};
    var sunday = isSunday(key);
    var totalSlots = sunday ? NAMOZLAR.length : (NAMOZLAR.length + TASKS.length);
    var doneSlots = NAMOZLAR.filter(function(n){ return ds['n_' + n.id]; }).length;
    if (!sunday) doneSlots += TASKS.filter(function(t){ return ds['t_' + t.id]; }).length;
    var pct = totalSlots ? (doneSlots / totalSlots) : 0;
    var h = Math.max(3, Math.round(pct * 72));
    var cls = pct >= 0.999 ? 'full' : (pct > 0 ? 'part' : 'none');
    var dow = keyToDate(key).getDay();
    html += '<div class="chart-bar-wrap"><div class="chart-bar ' + cls + '" style="height:' + h + 'px"></div>' +
      '<div class="chart-lbl">' + dayLabels[dow] + '</div></div>';
  });
  html += '</div></div>';
  return html;
}

function renderDebt() {
  var allDebts = getDebtItems();
  var filtered = allDebts.filter(function(d) {
    if (debtFilter === 'namoz') return d.type === 'namoz';
    if (debtFilter === 'task') return d.type === 'task';
    return true;
  });
  var namozCount = allDebts.filter(function(d){ return d.type === 'namoz'; }).length;
  var taskCount = allDebts.filter(function(d){ return d.type === 'task'; }).length;
  var html = '';
  html += '<div class="debt-page-header">' +
    '<div class="debt-page-title">' + allDebts.length + ' ta qarz</div>' +
    '<div class="debt-page-sub">Namoz: ' + namozCount + ' · Vazifa: ' + taskCount + '</div>' +
    '</div>';
  html += '<div class="debt-filters">' +
    '<div class="debt-filter ' + (debtFilter==='all'?'active':'') + '" onclick="APP.setDebtFilter(\'all\')">Hammasi (' + allDebts.length + ')</div>' +
    '<div class="debt-filter ' + (debtFilter==='namoz'?'active':'') + '" onclick="APP.setDebtFilter(\'namoz\')">Namoz (' + namozCount + ')</div>' +
    '<div class="debt-filter ' + (debtFilter==='task'?'active':'') + '" onclick="APP.setDebtFilter(\'task\')">Vazifa (' + taskCount + ')</div>' +
    '</div>';
  if (filtered.length === 0) {
    html += '<div class="debt-empty"><div class="debt-empty-icon">✓</div>' +
      (allDebts.length === 0 ? 'Hech qanday qarz yo\'q! Ajoyib.' : 'Bu filtr bo\'yicha qarz yo\'q.') +
      '</div>';
  } else {
    var groups = {};
    filtered.forEach(function(d) {
      if (!groups[d.key]) groups[d.key] = [];
      groups[d.key].push(d);
    });
    var sortedKeys = Object.keys(groups).sort(function(a, b){ return b > a ? 1 : -1; });
    sortedKeys.forEach(function(key) {
      var clickable = !isPastDayLocked(key);
      html += '<div class="debt-group">' +
        '<div class="debt-group-label">' + formatKey(key) + (clickable ? ' &nbsp;·&nbsp; <span style="color:var(--green);cursor:pointer" onclick="APP.openModal(\'' + key + '\')">tahrirlash →</span>' : ' &nbsp;<span style="color:var(--text3);font-size:9px">qulflangan</span>') + '</div>';
      groups[key].forEach(function(d) {
        html += '<div class="debt-item">' +
          '<div class="debt-item-day">' + (d.type === 'namoz' ? '🕌' : '📚') + '</div>' +
          '<div class="debt-item-name">' + d.name + '</div>' +
          '<div class="debt-item-badge ' + (d.type === 'namoz' ? 'debt-badge-namoz' : 'debt-badge-task') + '">' + (d.type === 'namoz' ? 'Namoz' : 'Vazifa') + '</div>' +
          '</div>';
      });
      html += '</div>';
    });
  }
  document.getElementById('debtContent').innerHTML = html;
}

function renderWeekly() {
  var days = getWeekDays(weeklyOffset);
  var today = new Date();
  var dayLbls = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
  var monDate = days[0];
  var sunDate = days[6];
  var mNames = ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'];
  var weekLabel = monDate.getDate() + ' ' + mNames[monDate.getMonth()] + ' — ' + sunDate.getDate() + ' ' + mNames[sunDate.getMonth()];
  var weekKey = days[0].getFullYear() + '-' + pad(days[0].getMonth()+1) + '-' + pad(days[0].getDate());
  var totalDays = 0, completeDays = 0, partialDays = 0, failedDays = 0;
  days.forEach(function(d) {
    var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (d < START || d > today) return;
    totalDays++;
    if (isDayComplete(k)) completeDays++;
    else if (isDayPartial(k)) partialDays++;
    else failedDays++;
  });
  var totalNamozThisWeek = 0, totalNamozPossible = 0;
  days.forEach(function(d) {
    var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    if (d < START || d > today) return;
    var ds = state[k] || {};
    NAMOZLAR.forEach(function(n){
      totalNamozPossible++;
      if (ds['n_' + n.id]) totalNamozThisWeek++;
    });
  });
  var wj = state['_week_' + weekKey];
  var weeklyEntries = getJournalEntries(wj);
  var html = '<div class="weekly-review-card">';
  html += '<div class="wr-week-nav">' +
    '<button class="wr-nav-btn" onclick="APP.weeklyPrev()">&#8249;</button>' +
    '<div class="wr-week-label">' + weekLabel + '</div>' +
    '<button class="wr-nav-btn" ' + (weeklyOffset >= 0 ? 'style="opacity:0.3;pointer-events:none"' : '') + ' onclick="APP.weeklyNext()">&#8250;</button>' +
    '</div>';
  html += '<div class="wr-days-grid">';
  days.forEach(function(d, i) {
    var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    var inRange = d >= START && d <= today;
    var isFuture = d > today;
    var isToday = k === todayKey();
    var isSun = d.getDay() === 0;
    var circleClass = 'wr-day-circle ';
    if (!inRange || isFuture) circleClass += 'out';
    else if (isDayComplete(k)) circleClass += 'full';
    else if (isSun) circleClass += 'sunday';
    else if (isDayPartial(k) || isToday) circleClass += 'part';
    else circleClass += 'failed';
    var border = isToday ? 'border:1.5px solid var(--green);' : '';
    html += '<div class="wr-day-col">' +
      '<div class="wr-day-lbl">' + dayLbls[i] + '</div>' +
      '<div class="' + circleClass + '" style="' + border + '" onclick="' + (inRange&&!isFuture?'APP.openModal(\''+k+'\')':'') + '">' + d.getDate() + '</div>' +
      '</div>';
  });
  html += '</div>';
  html += '<div class="wr-stats-row">' +
    '<div class="wr-stat"><div class="wr-stat-val" style="color:var(--green)">' + completeDays + '</div><div class="wr-stat-lbl">Mukammal</div></div>' +
    '<div class="wr-stat"><div class="wr-stat-val" style="color:var(--teal)">' + partialDays + '</div><div class="wr-stat-lbl">Qisman</div></div>' +
    '<div class="wr-stat"><div class="wr-stat-val" style="color:var(--red)">' + failedDays + '</div><div class="wr-stat-lbl">O\'tkazib</div></div>' +
    '<div class="wr-stat"><div class="wr-stat-val">' + totalNamozThisWeek + '/' + totalNamozPossible + '</div><div class="wr-stat-lbl">Namoz</div></div>' +
    '</div>';
  html += '<div class="wr-journal-section">' +
    '<div class="wr-journal-title">' + (weeklyOffset === 0 ? 'Bu hafta haqida' : 'Hafta sharhi') + '</div>';
  if (weeklyEntries.length) {
    html += '<div class="journal-entries-list">';
    weeklyEntries.slice().reverse().forEach(function(en) {
      html += '<div class="journal-entry-item">' +
        (en.ts ? '<div class="journal-entry-item-time">' + formatEntryTime(en.ts) + '</div>' : '') +
        '<div class="journal-entry-item-text">' + escapeHtml(en.t) + '</div></div>';
    });
    html += '</div>';
  }
  html += '<textarea class="wr-journal-textarea" id="weeklyJournalInput" placeholder="Bu hafta qanday o\'tdi? Nimani yaxshi qilding? Nimani yaxshilash kerak?"></textarea>' +
    '<button class="wr-journal-save" onclick="APP.addWeeklyJournalEntry(\'' + weekKey + '\', document.getElementById(\'weeklyJournalInput\').value); document.getElementById(\'weeklyJournalInput\').value=\'\';">Qo\'shish</button>' +
    '</div>';
  html += '</div>';
  html += '<div class="section-label">Namoz tahlili</div><div class="namoz-stats-table">';
  NAMOZLAR.forEach(function(n, ni) {
    var done = 0, total = 0;
    days.forEach(function(d) {
      var k = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
      if (d < START || d > today) return;
      total++;
      var ds = state[k] || {};
      if (ds['n_' + n.id]) done++;
    });
    var pct = total ? Math.round((done / total) * 100) : 0;
    html += '<div class="nst-row">' +
      '<div class="nst-icon" style="color:var(--green)">' + ICONS[NAMOZ_ICONS[ni]] + '</div>' +
      '<div class="nst-name">' + n.name + '</div>' +
      '<div class="nst-bar-wrap"><div class="nst-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="nst-pct">' + done + '/' + total + '</div>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById('weeklyContent').innerHTML = html;
}

// RENDER: JOURNAL PAGE
// ============================================================
function renderJournal() {
  var allEntries = [];
  var today = new Date();
  var d = new Date(START);
  while (d <= today) {
    var key = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    var ds = state[key] || {};
    var entries = getJournalEntries(ds);
    allEntries.push({ key: key, entries: entries, complete: isDayComplete(key), partial: isDayPartial(key) });
    d.setDate(d.getDate() + 1);
  }
  var filtered = allEntries.filter(function(e) {
    var joined = e.entries.map(function(en){ return en.t; }).join(' ');
    if (!journalSearch) return joined.length > 0 || e.key === todayKey();
    return joined.toLowerCase().indexOf(journalSearch.toLowerCase()) > -1;
  }).reverse();
  var withText = allEntries.filter(function(e){ return e.entries.length > 0; }).length;
  var html = '';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">' +
    '<div style="font-size:22px;font-weight:800;color:var(--text);font-family:var(--mono);">' + withText + '</div>' +
    '<div style="font-size:12px;color:var(--text3);">kun yozilgan</div>' +
    '</div>';
  html += '<input type="text" class="journal-search" placeholder="Jurnal ichida qidirish..." oninput="APP.setJournalSearch(this.value)" value="' + journalSearch.replace(/"/g,'&quot;') + '">';
  if (filtered.length === 0) {
    html += '<div class="journal-empty">Hech qanday yozuv topilmadi.</div>';
  } else {
    filtered.forEach(function(e) {
      var isExpanded = expandedJournalKey === e.key;
      var isLocked = isPastDayLocked(e.key);
      var dotColor = e.complete ? 'var(--green)' : (e.partial ? 'var(--teal)' : 'var(--red2)');
      var lastEntry = e.entries.length ? e.entries[e.entries.length - 1] : null;
      html += '<div class="journal-entry ' + (isExpanded?'expanded':'') + '" onclick="APP.toggleJournalEntry(\'' + e.key + '\')">' +
        '<div class="journal-entry-header">' +
        '<div class="journal-entry-day">' + formatKey(e.key) + '</div>' +
        '<div class="journal-entry-date">' + (e.entries.length > 1 ? e.entries.length + ' yozuv' : '') + '</div>' +
        '<div class="journal-entry-badge" style="background:' + dotColor + '"></div>' +
        '</div>';
      if (lastEntry) {
        html += '<div class="journal-entry-text">' + escapeHtml(lastEntry.t) + '</div>';
      } else {
        html += '<div class="journal-entry-text" style="color:var(--text3);font-style:italic">Yozuv yo\'q — bosing va yozing...</div>';
      }
      if (isExpanded) {
        if (e.entries.length > 1) {
          html += '<div class="journal-entries-list" onclick="event.stopPropagation()">';
          e.entries.slice(0, -1).reverse().forEach(function(en) {
            html += '<div class="journal-entry-item">' +
              (en.ts ? '<div class="journal-entry-item-time">' + formatEntryTime(en.ts) + '</div>' : '') +
              '<div class="journal-entry-item-text">' + escapeHtml(en.t) + '</div></div>';
          });
          html += '</div>';
        }
        if (!isLocked) {
          html += '<textarea class="journal-entry-edit open" id="journalAdd_' + e.key + '" placeholder="Yangi yozuv qo\'shing..." onclick="event.stopPropagation()"></textarea>' +
            '<button class="wr-journal-save" onclick="event.stopPropagation();APP.addJournalEntry(\'' + e.key + '\', document.getElementById(\'journalAdd_' + e.key + '\').value); document.getElementById(\'journalAdd_' + e.key + '\').value=\'\';">Qo\'shish</button>';
        } else {
          html += '<div style="font-size:11px;color:var(--text3);margin-top:8px;">🔒 Bu kun qulflangan.</div>';
        }
      }
      html += '</div>';
    });
  }
  document.getElementById('journalContent').innerHTML = html;
}

// RENDER: STATISTICS
// ============================================================
function renderStats() {
  var streak = getStreak();
  var totalDone = getTotalComplete();
  var daysPassed = Math.max(0, Math.round((new Date() - START) / 86400000));
  var successPct = daysPassed > 0 ? Math.round((totalDone / daysPassed) * 100) : 0;
  var debts = getDebtItems();
  var namozStats = getNamozStats();
  var bestStreak = 0, curS = 0;
  var today2 = new Date();
  for (var i = 0; i < TOTAL_DAYS; i++) {
    var d = new Date(today2); d.setDate(d.getDate() - i);
    if (d < START) break;
    var k = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    if (isDayComplete(k)) { curS++; if (curS > bestStreak) bestStreak = curS; }
    else curS = 0;
  }
  var totalNamoz = 0, totalNamozPossible = 0;
  Object.values(namozStats).forEach(function(s){ totalNamoz += s.done; totalNamozPossible += s.total; });
  var html = '';
  html += '<div class="stats-big-grid">' +
    '<div class="stat-big accent-green"><div class="stat-big-val">' + streak + '</div><div class="stat-big-lbl">Joriy Streak</div><div class="stat-big-sub">kun uzluksiz</div></div>' +
    '<div class="stat-big accent-blue"><div class="stat-big-val">' + bestStreak + '</div><div class="stat-big-lbl">Eng Uzun</div><div class="stat-big-sub">streak</div></div>' +
    '<div class="stat-big accent-green"><div class="stat-big-val">' + totalDone + '</div><div class="stat-big-lbl">Mukammal Kun</div><div class="stat-big-sub">/ ' + daysPassed + ' o\'tdi</div></div>' +
    '<div class="stat-big ' + (successPct >= 80 ? 'accent-green' : successPct >= 50 ? 'accent-amber' : 'accent-red') + '"><div class="stat-big-val">' + successPct + '%</div><div class="stat-big-lbl">Umumiy Natija</div><div class="stat-big-sub">muvaffaqiyat</div></div>' +
    '</div>';
  html += '<div class="stats-big-grid">' +
    '<div class="stat-big"><div class="stat-big-val">' + totalNamoz + '</div><div class="stat-big-lbl">Namoz O\'qildi</div><div class="stat-big-sub">/ ' + totalNamozPossible + ' dan</div></div>' +
    '<div class="stat-big accent-red"><div class="stat-big-val">' + debts.length + '</div><div class="stat-big-lbl">Qarz</div><div class="stat-big-sub">bajarilmagan</div></div>' +
    '</div>';
  html += '<div class="section-label">Har bir namoz</div><div class="namoz-stats-table">';
  NAMOZLAR.forEach(function(n, i) {
    var s = namozStats[n.id];
    var pct = s.total ? Math.round((s.done / s.total) * 100) : 0;
    html += '<div class="nst-row">' +
      '<div class="nst-icon" style="color:var(--green)">' + ICONS[NAMOZ_ICONS[i]] + '</div>' +
      '<div class="nst-name">' + n.name + '</div>' +
      '<div class="nst-bar-wrap"><div class="nst-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="nst-pct">' + pct + '%</div>' +
      '</div>';
  });
  html += '</div>';
  var dayLbls = ['Ya','Du','Se','Ch','Pa','Ju','Sh'];
  var wEnd = new Date(today2);
  wEnd.setDate(wEnd.getDate() + (0 - wEnd.getDay() + 7) % 7);
  if (wEnd > today2) wEnd.setDate(wEnd.getDate() - 7);
  var weeks = [];
  for (var w = 6; w >= 0; w--) {
    var weekDays = [];
    var sunOfWeek = new Date(wEnd); sunOfWeek.setDate(wEnd.getDate() - w * 7);
    var monOfWeek = new Date(sunOfWeek); monOfWeek.setDate(sunOfWeek.getDate() - 6);
    for (var wd = 0; wd < 7; wd++) {
      var dd = new Date(monOfWeek); dd.setDate(monOfWeek.getDate() + wd);
      weekDays.push(dd);
    }
    weeks.push(weekDays);
  }
  html += '<div class="section-label">Haftalik ko\'rinish</div>';
  html += '<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;overflow-x:auto;">';
  html += '<div style="display:flex;gap:4px;min-width:min-content;">';
  html += '<div style="display:flex;flex-direction:column;gap:4px;margin-right:4px;">';
  html += '<div style="height:14px"></div>';
  dayLbls.forEach(function(l){
    html += '<div style="font-size:8px;color:var(--text3);font-family:var(--mono);height:14px;display:flex;align-items:center;letter-spacing:0.06em;">' + l + '</div>';
  });

    html += '<div style="font-size:7px;color:var(--text3);font-family:var(--mono);text-align:center;height:14px;white-space:nowrap;">' + wLabel + '</div>';
    wDays.forEach(function(dd) {
      var key2 = dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate());
      var inRange = dd >= START && dd <= today2;
      var bgColor = 'var(--bg4)';
      if (inRange) {
        if (isDayComplete(key2)) bgColor = 'var(--green)';

  });
  html += '</div></div>';
  document.getElementById('statsContent').innerHTML = html;
}

function renderCalendar() {

  var firstDay = new Date(calYear, calMonth, 1);
  var lastDay  = new Date(calYear, calMonth + 1, 0);
  var startDow = firstDay.getDay();
  if (startDow === 0) startDow = 7;
  var html = '<div class="cal-month-nav">' +
    '<button class="cal-nav-btn" onclick="APP.calPrev()">&#8249;</button>' +
    '<div class="cal-month-label">' + monthNames[calMonth] + ' ' + calYear + '</div>' +
    '<button class="cal-nav-btn" onclick="APP.calNext()">&#8250;</button></div>' +
    '<div class="cal-weekdays"><div class="cal-wd">Du</div><div class="cal-wd">Se</div><div class="cal-wd">Ch</div>' +
    '<div class="cal-wd">Pa</div><div class="cal-wd">Ju</div><div class="cal-wd">Sh</div>' +
    '<div class="cal-wd" style="color:var(--amber)">Ya</div></div>' +
    '<div class="cal-grid">';
  for (var i = 1; i < startDow; i++) html += '<div class="cal-day empty"></div>';
  for (var day = 1; day <= lastDay.getDate(); day++) {
    var dateObj = new Date(calYear, calMonth, day);
    var key = dateObj.getFullYear() + '-' + pad(dateObj.getMonth()+1) + '-' + pad(dateObj.getDate());
    var inRange = dateObj >= START && dateObj < END;
    var isFuture = dateObj > today;
    var isToday = key === todayStr;
    var isSun = dateObj.getDay() === 0;
    var cls = 'cal-day';
    if (!inRange) cls += ' outside-range';
    else if (isFuture) cls += ' future';
    else if (isDayComplete(key)) cls += ' completed';
    else if (isToday) cls += ' today';
    else if (isSun) cls += ' sunday-rest';
    else if (isDayPartial(key)) cls += ' partial';
    else cls += ' failed';
    var clickable = inRange && !isFuture;
    html += '<div class="' + cls + '"' + (clickable ? ' onclick="APP.openModal(\'' + key + '\')"' : '') + '>' + day + '</div>';
  }
  html += '</div><div class="cal-legend">' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>Mukammal</div>' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green2);border:0.5px solid var(--teal)"></div>Qisman</div>' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--red2);border:0.5px solid var(--red)"></div>O\'tkazib</div>' +
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--amber2);border:0.5px solid var(--amber)"></div>Yakshanba</div>' +
    '</div>';
  document.getElementById('calContent').innerHTML = html;
}

// ============================================================
// ANDOZA TASK TIMES — [js_start, js_end, vim_start, vim_end, din_start, din_end]
// Har kun uchun alohida vaqt belgilash mumkin.
// Default: JS 03:30-07:30, Vim 13:30-14:30, Din 20:00-22:00
// ============================================================
const ANDOZA_TIMES = {
  // "YYYY-MM-DD": ["js_start","js_end","vim_start","vim_end","din_start","din_end"]
  // Agar kun uchun yozilmasa — DEFAULT_ANDOZA ishlatiladi
};
const DEFAULT_ANDOZA = ["03:30","07:30","13:30","14:30","20:00","22:00"];

function getAndozaRows() {
  var tk = todayKey();
  // Namoz vaqtlari — ISLOM_TIMES JSON dan (har kun o'zgaradi)
  var namoz = ISLOM_TIMES[tk]
    ? ISLOM_TIMES[tk]
    : [NAMOZLAR[0].time, NAMOZLAR[1].time, NAMOZLAR[2].time, NAMOZLAR[3].time, NAMOZLAR[4].time];
  // [0]=bomdod [1]=peshin [2]=asr [3]=shom [4]=xufton

  // Task vaqtlari — ANDOZA_TIMES JSON dan (kun bo'yicha yoki default)
  var t = ANDOZA_TIMES[tk] || DEFAULT_ANDOZA;
  // [0]=js_start [1]=js_end [2]=vim_start [3]=vim_end [4]=din_start [5]=din_end

  function dur(s, e) {
    var diff = timeToMins(e) - timeToMins(s);
    if (diff <= 0) diff += 1440;
    var h = Math.floor(diff/60), m = diff%60;
    return h > 0 ? (h + ' soat' + (m ? ' ' + m + ' daq' : '')) : (m + ' daqiqa');
  }

  return [
    {
      id: 'bomdod', name: 'Bomdod', sub: 'Namoz + Zikr',
      timeStr: namoz[0] + '-' + addMins(namoz[0], 15), dur: '15 daqiqa',
      iconKey: 'moon', iconColor: '#6B8ED6', iconBg: 'rgba(107,142,214,0.12)',
      type: 'namoz', startTime: namoz[0], endTime: addMins(namoz[0], 15)
    },
    {
      id: 'js', name: 'JS oʼrganing', sub: 'JavaScript · Deep work',
      timeStr: t[0] + '-' + t[1], dur: dur(t[0], t[1]),
      iconKey: 'code', iconColor: '#7AAAF0', iconBg: 'rgba(58,123,213,0.12)',
      type: 'task', startTime: t[0], endTime: t[1]
    },
    {
      id: 'peshin', name: 'Peshin', sub: 'Namoz + Zikr',
      timeStr: namoz[1] + '-' + addMins(namoz[1], 17), dur: '17 daqiqa',
      iconKey: 'sun', iconColor: '#F5C842', iconBg: 'rgba(245,200,66,0.12)',
      type: 'namoz', startTime: namoz[1], endTime: addMins(namoz[1], 17)
    },
    {
      id: 'vim', name: 'Vim kursi', sub: 'Amaliyot',
      timeStr: t[2] + '-' + t[3], dur: dur(t[2], t[3]),
      iconKey: 'terminal', iconColor: '#BEB8F5', iconBg: 'rgba(140,130,240,0.12)',
      type: 'task', startTime: t[2], endTime: t[3]
    },
    {
      id: 'asr', name: 'Asr', sub: 'Namoz + Zikr',
      timeStr: namoz[2] + '-' + addMins(namoz[2], 10), dur: '10 daqiqa',
      iconKey: 'cloud', iconColor: '#8DB8D6', iconBg: 'rgba(141,184,214,0.12)',
      type: 'namoz', startTime: namoz[2], endTime: addMins(namoz[2], 10)
    },
    {
      id: 'shom', name: 'Shom', sub: 'Namoz + Zikr',
      timeStr: namoz[3] + '-' + addMins(namoz[3], 12), dur: '12 daqiqa',
      iconKey: 'sunset', iconColor: '#E88A3A', iconBg: 'rgba(232,138,58,0.12)',
      type: 'namoz', startTime: namoz[3], endTime: addMins(namoz[3], 12)
    },
    {
      id: 'din', name: 'Quron & Hadis', sub: 'Oʼqish · Islomiy ilm',
      timeStr: t[4] + '-' + t[5], dur: dur(t[4], t[5]),
      iconKey: 'book', iconColor: '#F0C870', iconBg: 'rgba(232,160,32,0.12)',
      type: 'task', startTime: t[4], endTime: t[5]
    },
    {
      id: 'xufton', name: 'Xufton', sub: 'Namoz + Zikr',
      timeStr: namoz[4] + '-' + addMins(namoz[4], 15), dur: '15 daqiqa',
      iconKey: 'stars', iconColor: '#9B7ED6', iconBg: 'rgba(155,126,214,0.12)',
      type: 'namoz', startTime: namoz[4], endTime: addMins(namoz[4], 15)
    },
  ];
}

function addMins(timeStr, mins) {
  var parts = timeStr.split(':');
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10) + mins;
  h += Math.floor(m / 60);
  m = m % 60;
  if (h >= 24) h -= 24;
  return pad(h) + ':' + pad(m);
}

function timeToMins(t) {
  var p = t.split(':');
  return parseInt(p[0],10)*60 + parseInt(p[1],10);
}

function getCurrentAndozaIdx(rows) {
  var now = new Date();
  var nowMins = now.getHours()*60 + now.getMinutes();
  for (var i = 0; i < rows.length; i++) {
    var s = timeToMins(rows[i].startTime);
    var e = timeToMins(rows[i].endTime);
    // bomdod special: might be before midnight wrap
    if (nowMins >= s && nowMins < e) return i;
  }
  // Find next upcoming
  for (var i = 0; i < rows.length; i++) {
    if (timeToMins(rows[i].startTime) > nowMins) return i;
  }
  return -1;
}
